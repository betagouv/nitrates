[flake8]
max-line-length = 120
exclude = .tox,.git,*/migrations/*,*/static/CACHE/*,docs,node_modules,venv,*/bassins_versants/*

[pycodestyle]
max-line-length = 120
exclude = .tox,.git,*/migrations/*,*/static/CACHE/*,docs,node_modules,venv

[mypy]
python_version = 3.9
check_untyped_defs = True
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
plugins = mypy_django_plugin.main

[mypy.plugins.django-stubs]
django_settings_module = config.settings.test

[mypy-*.migrations.*]
# Django migrations should not produce any errors:
ignore_errors = True

[coverage:run]
include = envergo/*
omit = *migrations*, *tests*
plugins =
    django_coverage_plugin

[coverage:report]
show_missing = True
skip_covered = False
# Piste future : decommenter `fail_under = N` pour faire echouer la CI sous un
# seuil de couverture. Laisse desactive pour l'instant (ne pas bloquer la CI).
# fail_under = 80

[flake8]
max-line-length = 120
exclude = .tox,.git,*/migrations/*,*/static/CACHE/*,docs,node_modules,venv,*/bassins_versants/*

[pycodestyle]
max-line-length = 120
exclude = .tox,.git,*/migrations/*,*/static/CACHE/*,docs,node_modules,venv

[mypy]
python_version = 3.9
check_untyped_defs = True
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
plugins = mypy_django_plugin.main

[mypy.plugins.django-stubs]
django_settings_module = config.settings.test

[mypy-*.migrations.*]
# Django migrations should not produce any errors:
ignore_errors = True

[coverage:run]
source = envergo
# On ne mesure que le CODE FONCTIONNEL. Sont exclus :
#  - les tests eux-memes (ca n'a pas de sens qu'un test se "couvre" lui-meme) ;
#  - les migrations (auto-generees, non testees a la main) ;
#  - les fichiers techniques sans logique (apps.py, __init__, settings, wsgi).
# Patterns avec slash pour qu'ils tiennent meme avec un --include en ligne de
# commande (un pattern sans slash type *tests* est ignore dans ce cas).
omit =
    */tests/*
    */tests.py
    */test_*.py
    */conftest.py
    */migrations/*
    */__init__.py
    */apps.py
    config/*
    envergo/contrib/*
    # REVERT_AT_MERGE_TIME_FOR_UPSTREAM_ENVERGO
    # Apps Envergo NON utilisees par le simulateur nitrates : on les GARDE dans
    # le repo (fork, re-merge upstream possible) mais on ne les MESURE PAS en
    # coverage — sinon la metrique nitrates est diluee par du code jamais
    # exerce par nos tests. (Le code n'est pas supprime, juste hors coverage.)
    envergo/petitions/*
    envergo/hedges/*
    envergo/demos/*
    envergo/pages/*
    envergo/stats/*
    envergo/analytics/*
    envergo/urlmappings/*
plugins =
    django_coverage_plugin

[coverage:report]
show_missing = True
skip_covered = False
# Piste future : decommenter `fail_under = N` pour faire echouer la CI sous un
# seuil de couverture. Laisse desactive pour l'instant (ne pas bloquer la CI).
# fail_under = 80

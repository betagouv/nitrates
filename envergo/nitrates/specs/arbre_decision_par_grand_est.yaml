                                  valeur: false
                                  libelle: Non — pas en zone montagne
                                reference: zone_montagne_d113_14
                                type_noeud: catalogue
                              valeur: true
                              libelle: Oui
                            - valeur: false
                              libelle: Non
                              feuille_vide: true
                            type_noeud: formulaire
                          valeur: icpe_a
                          libelle: Oui
                        - valeur: autre
                          libelle: Non
                          feuille_vide: true
                        type_noeud: formulaire
                      valeur: type_III
                      libelle: Type III
                    type_noeud: formulaire
                  valeur: En Zone Grand Est 1
                  libelle: En Zone Grand Est 1
                reference: zone_grand_est_1
                type_noeud: catalogue
              valeur: luzerne
              libelle: Luzerne
            - noeud:

arbre:
  noeud:
    id: n_en_zone_vulnerable
    champ: en_zone_vulnerable
    source: sig
    branches:
    - regle:
        id: r_racine
        type: non_applicable
        message: La parcelle n'est pas en zone vulnérable aux nitrates. La réglementation nitrates ne s'applique pas.
      valeur: false
      libelle: Non
    - noeud:
        id: q_occupation_sol
        champ: occupation_sol
        texte: Est-ce que la culture en place est une culture principale ou un couvert végétal d'interculture ?
        niveau: culture
        branches:
        - noeud:
            id: q_sous_culture
            champ: sous_culture
            texte: Quelle est la culture principale ?
            niveau: sous_culture
            branches:
            - noeud:
                id: q_culture_hiver
                champ: type_fertilisant
                texte: Quel type de fertilisant est utilisé ?
                niveau: type_fertilisant
                branches:
                - noeud:
                    id: n_culture_hiver_type_II
                    champ: resolution_digestats_par_hiver_type_ii
                    branches:
                    - noeud:
                        id: n_culture_hiver_type_II_digestats
                        champ: resolution_prairie_automne_par_hiver
                        branches:
                        - regle:
                            id: r_culture_hiver_type_II_digestats_prairie_automne
                            type: interdiction
                            periodes:
                            - au: 31/01
                              du: 15/11
                              regime: interdiction
                          valeur: prairie_automne
                          libelle: Prairie de moins de 6 mois implantée à l'automne ou en fin d'été
                          expression: sous_culture_form == 'prairie_moins_6_mois_automne'
                        - regle:
                            id: r_culture_hiver_type_II_digestats_hors_prairie_automne
                            type: calculatrice
                            texte: Interdit jusqu'à 15 jours avant le semis, puis du 01/10 au 01/02. Plafond PAR Grand Est de 30 kg d'azote minéral.
                            periodes:
                            - au: date_semis_couvert-15jours
                              du: 01/07
                              regime: interdiction
                            - au: 01/02
                              du: 01/10
                              regime: interdiction
                            composant: calendrier_dynamique_couvert
                            inputs_requis:
                            - id: date_semis_couvert
                              type: date
                              label: Date de semis
                              label_court: semis
                              placeholder: 25/08
                          valeur: hors_prairie_automne
                          libelle: Autre culture d'hiver (hors prairie de moins de 6 mois implantée à l'automne)
                          expression: sous_culture_form != 'prairie_moins_6_mois_automne'
                        type_noeud: catalogue_parametre
                      valeur: Le fertilisant est un digestat
                      libelle: Le fertilisant est un digestat
                      expression: categorie_fertilisant == 'digestats'
                    - valeur: Autre fertilisant de type II
                      libelle: Autre fertilisant de type II
                      expression: categorie_fertilisant != 'digestats'
                      feuille_vide: true
                    type_noeud: catalogue_parametre
                  valeur: type_II
                  libelle: Type II
                type_noeud: formulaire
              valeur: culture_hiver_hors_colza
              libelle: Culture d'hiver autre que colza
            - noeud:
                id: q_colza
                champ: type_fertilisant
                texte: Quel type de fertilisant est utilisé ?
                niveau: type_fertilisant
                branches:
                - noeud:
                    id: n_colza_type_II
                    champ: categorie_fertilisant_digestats_colza_ii
                    branches:
                    - regle:
                        id: r_colza_type_II_digestats
                        type: calculatrice
                        texte: Interdit avant 15 jours avant le semis puis du 01/10 au 01/02
                        periodes:
                        - au: date_semis_colza-15jours
                          du: 01/07
                          regime: interdiction
                          condition: 01/07 < date_semis_colza-15jours
                        - au: 01/02
                          du: 01/10
                          regime: interdiction
                        composant: calendrier_dynamique_couvert
                        inputs_requis:
                        - id: date_semis_colza
                          type: date
                          label: Date de semis du colza
                          label_court: semis
                          placeholder: 20/08
                      valeur: Digestats
                      libelle: Catégorie de fertilisant "Digestats"
                      expression: categorie_fertilisant == 'digestats'
                    type_noeud: catalogue_parametre
                  valeur: type_II
                  libelle: Type II
                type_noeud: formulaire
              valeur: colza
              libelle: Colza
            - noeud:
                id: n_culture_printemps
                champ: culture_printemps_detail
                branches:
                - noeud:
                    id: q_culture_printemps_prairie_moins_6_mois_printemps
                    champ: type_fertilisant
                    texte: Quel type de fertilisant est utilisé ?
                    niveau: type_fertilisant
                    branches:
                    - noeud:
                        id: n_culture_printemps_prairie_moins_6_mois_printemps_type_II
                        champ: fertilisant_digestats
                        branches:
                        - regle:
                            id: r_culture_printemps_prairie_moins_6_mois_printemps_type_II_digestats
                            type: interdiction
                            periodes:
                            - au: 31/01
                              du: 15/11
                              regime: interdiction
                          valeur: Le fertilisant est un digestat
                          libelle: Le fertilisant est un digestat
                          expression: categorie_fertilisant=='digestats'
                        type_noeud: catalogue_parametre
                      valeur: type_II
                      libelle: Type_II
                    type_noeud: formulaire
                  valeur: prairie_moins_6_mois_printemps
                  expression: sous_culture_form == 'prairie_moins_6_mois_printemps'
                - noeud:
                    id: n_culture_printemps_mais
                    champ: zone_grand_est_1
                    source: sig
                    branches:
                    - noeud:
                        id: q_culture_printemps_mais_en_zone_grand_est_1
                        champ: q_type_fertilisant_par_mais
                        texte: Quel type de fertilisant est utilisé ?
                        niveau: type_fertilisant
                        branches:
                        - noeud:
                            id: q_culture_printemps_mais_en_zone_grand_est_1_type_II
                            champ: type_ii
                            texte: Le fertilisant utilisé est-il issu du traitement et/ou de la transformation de matières premières en vue de la fabrication de produits alimentaires ou d'aliments pour
                              animaux ?
                            niveau: complement
                            branches:
                            - regle:
                                id: r_culture_printemps_mais_en_zone_grand_est_1_type_II_iaa
                                type: mixte
                                periodes:
                                - au: 15/02
                                  du: 31/08
                                  regime: interdiction
                                - au: 31/08
                                  du: 01/07
                                  regime: autorisation_sous_condition
                                inputs_requis: []
                                texte_condition: Autorisé sous condition entre le 01/07 et le 31/08.
                                code_prescription: pc6
                              valeur: true
                              libelle: Oui
                            - regle:
                                id: r_culture_printemps_mais_en_zone_grand_est_1_type_II_non_iaa
                                type: interdiction
                                periodes:
                                - au: 15/02
                                  du: 01/07
                                  regime: interdiction
                                inputs_requis: []
                              valeur: false
                              libelle: Non
                            type_noeud: formulaire
                          valeur: type_II
                          libelle: Type_II
                        type_noeud: formulaire
                      valeur: q_type_fertilisant_par_mais
                      libelle: Quel type de fertilisant est utilisé ?
                    reference: zone_grand_est_1
                    type_noeud: catalogue
                  valeur: mais
                  libelle: Mais
                  expression: sous_fertilisant == 'mais'
                type_noeud: catalogue_parametre
              valeur: culture_printemps
            - noeud:
                id: n_prairie_plus_6_mois
                champ: zone_grand_est_1
                source: sig
                branches:
                - noeud:
                    id: q_prairie_plus_6_mois_en_zone_grand_est_1
                    champ: type_fertilisant
                    texte: Quel type de fertilisant est utilisé ?
                    niveau: type_fertilisant
                    branches:
                    - noeud:
                        id: n_prairie_plus_6_mois_en_zone_grand_est_1_type_II
                        champ: effluent_peu_charge
                        branches:
                        - regle:
                            id: r_prairie_plus_6_mois_en_zone_grand_est_1_type_II_effluent_peu_charge
                            type: autorisation_sous_condition
                            periodes:
                            - au: 31/01
                              du: 15/11
                              regime: autorisation_sous_condition
                            inputs_requis: []
                            code_prescription:
                            - pc7
                            - pc16
                          valeur: effluent_peu_charge
                          libelle: Effluent peu chargé
                          expression: sous_fertilisant in ('effluents_peu_charges_elevage', 'effluents_peu_charges_non_elevage')
                        - regle:
                            id: r_prairie_plus_6_mois_en_zone_grand_est_1_type_II_pas_effluent_peu_charge
                            type: interdiction
                            periodes:
                            - au: 31/01
                              du: 15/11
                            inputs_requis: []
                            code_prescription: pc16
                          valeur: pas effluent peu charge
                          libelle: Pas effluent peu charge
                          expression: sous_fertilisant not in ('effluents_peu_charges_elevage', 'effluents_peu_charges_non_elevage')
                        type_noeud: catalogue_parametre
                      valeur: type_II
                      libelle: Type II
                    type_noeud: formulaire
                  valeur: q_type_fertilisant_par_mais
                  libelle: Quel type de fertilisant est utilisé ?
                reference: zone_grand_est_1
                type_noeud: catalogue
              valeur: prairie_plus_6_mois
              libelle: Prairies implantées depuis plus de six mois (dont prairie permanente)

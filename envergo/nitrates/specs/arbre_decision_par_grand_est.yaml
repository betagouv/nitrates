                        niveau: complement
                        branches:
                        - noeud:
                            id: q_luzerne_en_zone_grand_est_1_type_III_icpe_a
                            aide: ''
                            champ: fertilisant_iaa
                            texte: Le fertilisant utilisé est-il issu du traitement et/ou de la transformation de matières premières en vue de la fabrication de produits alimentaires ou d'aliments pour
                              animaux ? (Note 12)
                            niveau: complement
                            branches:
                            - noeud:
                                id: n_luzerne_en_zone_grand_est_1_type_III_icpe_a_iaa
                                champ: zone_montagne_d113_14
                                texte: L'îlot cultural est-il situé en zone de montagne (article D113-14 du code rural et de la pêche) ?
                                source: sig
                                branches:
                                - noeud:
                                    id: n_luzerne_en_zone_grand_est_1_type_III_icpe_a_iaa_2
                                    champ: zonage_montagne_regional
                                    source: sig
                                    branches:
                                    - regle:
                                        id: r_luzerne_en_zone_grand_est_1_type_III_icpe_a_iaa_note_6
                                        type: mixte
                                        periodes:
                                        - au: 28/02
                                          du: 01/10
                                          regime: interdiction
                                        - au: 31/12
                                          du: derniere_coupe_luzerne
                                          regime: autorisation_sous_condition
                                        composant: luzerne_post_coupe
                                        parametres:
                                          note: note_6
                                          code_prescription: pc10
                                          texte_alternative: Autorisé sous conditions après la dernière coupe de luzerne. Sinon interdit du 01/10 au 28/02.
                                          periode_reglementaire:
                                            au: 28/02
                                            du: 01/10
                                        inputs_requis:
                                        - date_derniere_coupe_luzerne
                                        code_prescription: pc10
                                      valeur: note_6
                                      libelle: Oui, dans une autre région et/ou départements (Note 6)
                                    reference: zone_note_7_vs_note_6
                                    type_noeud: catalogue
                                  valeur: true
                                  libelle: Oui, îlot en zone montagne (article D113-14)
                                - regle:
                                    id: r_luzerne_en_zone_grand_est_1_type_III_icpe_a_iaa
                                    type: mixte
                                    periodes:
                                    - au: 31/01
                                      du: 01/10
                                      regime: interdiction
                                    - au: 31/12
                                      du: derniere_coupe_luzerne
                                      regime: autorisation_sous_condition
                                    composant: luzerne_post_coupe
                                    parametres:
                                      code_prescription: pc10

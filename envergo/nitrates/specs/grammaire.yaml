# =============================================================================
# GRAMMAIRE de l'arbre de décision nitrates — v2
# =============================================================================
# Principes :
#   1. L'arbre reflète la structure du formulaire utilisateur :
#      4 niveaux formulaire ordonnés + nœuds catalogue intercalables.
#   2. Chaque nœud déclare explicitement sa nature (formulaire vs catalogue)
#      via une valeur scalaire `type_noeud` (pattern visiteur).
#   3. Les feuilles "calculatrices" (mini web app) délèguent à un composant
#      nommé, paramétré par YAML, implémenté côté backend.
#
# La grammaire a 3 primitives :
#   - `noeud`   : un nœud interne (formulaire ou catalogue) qui ouvre des branches
#   - `branche` : une réponse possible
#   - `regle`   : une feuille produisant un résultat
# =============================================================================


# ─────────────────────────────────────────────────────────────────────────────
# PRIMITIVE 1 — `noeud`
# ─────────────────────────────────────────────────────────────────────────────
# Tout nœud interne porte un `type_noeud` discriminant, à valeur scalaire :
#   - "formulaire" : question posée à l'utilisateur
#   - "catalogue"  : dimension résolue automatiquement (SIG, mapping référentiel)
#
# Champs communs :
#   - id       : identifiant unique (préfixe `q_` formulaire, `n_` catalogue)
#   - champ    : nom technique de la donnée portée par le nœud
#   - branches : liste de branches (cf. primitive 2)


# ── Sous-type "formulaire" ────────────────────────────────────────────────────
# Un nœud formulaire est posé à l'utilisateur. Il appartient à l'un des
# 4 niveaux ordonnés :
#   1. "culture"          → occupation du sol (culture principale, couvert, prairie, sol non cultivé…)
#   2. "sous_culture"     → culture précise (colza, maïs, luzerne, CINE/CIE, prairie >6 mois…)
#   3. "type_fertilisant" → type réglementaire (type 0, Ia, Ib, II, III, effluent peu chargé, IAA…)
#   4. "complement"       → questions complémentaires chaînables (plan d'épandage, IAA, fertirrigation, irrigation…)
#
# Règle d'ordre : sur tout chemin racine→feuille, les nœuds formulaire
# rencontrés respectent l'ordre culture → sous_culture → type_fertilisant
# → complement (sauts autorisés, retour en arrière interdit, doublon interdit
# pour les 3 premiers niveaux ; `complement` peut se chaîner 0..N fois).

exemple_noeud_formulaire:
  noeud:
    type_noeud: "formulaire"
    niveau: "culture"                   # ∈ {culture, sous_culture, type_fertilisant, complement}
    id: "q_occupation_sol"
    texte: "Quelle est l'occupation du sol ?"
    champ: "occupation_sol"
    aide: "Texte d'aide optionnel (tooltip)."
    branches:
      - # voir primitive `branche`
      - # ...


# ── Sous-type "catalogue" ─────────────────────────────────────────────────────
# Un nœud catalogue est résolu automatiquement par la moulinette à partir
# de la localisation de la parcelle ou d'autres données déjà connues.
# Pas de question posée à l'utilisateur.
#
# Champs spécifiques :
#   - source    : "sig" (couche géographique) | "mapping_referentiel" (table) | "calcul"
#   - reference : identifiant dans referentiels.yaml ou nom de couche SIG (selon source)
#
# Les nœuds catalogue peuvent s'intercaler n'importe où dans l'arbre (avant,
# entre ou après les niveaux formulaire).

exemple_noeud_catalogue:
  noeud:
    type_noeud: "catalogue"
    id: "n_zvn"
    champ: "en_zone_vulnerable"
    source: "sig"                       # ∈ {sig, mapping_referentiel, calcul}
    reference: "zone_vulnerable_nitrates"
    branches:
      - # voir primitive `branche`


# ─────────────────────────────────────────────────────────────────────────────
# PRIMITIVE 2 — `branche`
# ─────────────────────────────────────────────────────────────────────────────
# Une branche représente UNE réponse (ou un groupe de réponses) à la
# question/dimension parente.
# Elle contient EXACTEMENT UN de :
#   - `valeur`     : une réponse unique (bool, string snake_case, ou int)
#   - `valeurs`    : une liste de réponses qui mènent toutes vers le même
#                     sous-arbre. Utile pour les regroupements (ex
#                     `valeurs: [icpe_e, icpe_d]` représente "ICPE E ou D",
#                     plus simple que dupliquer 2 branches).
# Et `libelle`     : texte affiché (optionnel, défaut = valeur prettifiée)
# Et EXACTEMENT UN des suivants :
#       * `noeud`        : sous-arbre (récursion)
#       * `regle`        : feuille terminale
#       * `renvoi_vers`  : alias vers une règle déjà définie

exemple_branche_avec_sous_noeud:
  - valeur: "culture_principale"
    libelle: "Culture principale"
    noeud:
      type_noeud: "formulaire"
      niveau: "sous_culture"
      id: "q_sous_culture_principale"
      texte: "Quelle culture ?"
      champ: "sous_culture"
      branches: []

exemple_branche_avec_regle:
  - valeur: "sol_non_cultive"
    libelle: "Sol non cultivé"
    regle:
      id: "r_sol_non_cultive"
      type: "interdiction"
      periodes:
        - du: "01/01"
          au: "31/12"

exemple_branche_renvoi:
  - valeur: "type_III"
    renvoi_vers: "r_prairie_plus_6_type_III"


# ─────────────────────────────────────────────────────────────────────────────
# PRIMITIVE 3 — `regle`
# ─────────────────────────────────────────────────────────────────────────────
# Feuille de l'arbre. Produit un résultat réglementaire.
# Champs communs :
#   - id : identifiant unique (préfixe `r_`)
#   - type : voir ci-dessous
#   - note (optionnel) : référence vers referentiels.yaml > notes
#   - code_prescription (optionnel) : référence vers referentiels.yaml > codes_prescription
#   - source_juridique (optionnel) : article d'arrêté
#
# Types possibles :
#   - "interdiction"
#   - "autorisation_sous_condition"
#   - "plafonnement"
#   - "libre"
#   - "non_applicable"
#   - "calculatrice"            # nouveau : délégation à un composant nommé
#   - "mixte"                   # plusieurs régimes coexistent sur la règle
#                                 (>= 2 régimes distincts dans les périodes,
#                                 chaque période a son `regime` explicite)


# ── Type "interdiction" ──────────────────────────────────────────────────────

exemple_regle_interdiction:
  regle:
    id: "r_colza_type_0"
    type: "interdiction"
    periodes:
      - du: "15/12"
        au: "15/01"
    code_prescription: "pc4"
    note: "note_3"
    source_juridique: "arrêté 19/12/2011 annexe I §3.1"


# ── Périodes à régime mixte ──────────────────────────────────────────────────
# Convention grammaire (2026-05-11) :
#
# Deux conventions coexistent :
#
# A) `type=mixte` : régime explicitement multiple sur la règle.
#    Utilisé quand la règle exprime plusieurs régimes distincts dans ses
#    périodes (ex. autorisation_sous_condition sur 01/09→15/10 +
#    interdiction sur 15/10→15/01). Le validator EXIGE :
#      - au moins 2 périodes
#      - chaque période a un `regime` explicite (pas d'héritage)
#      - au moins 2 régimes DISTINCTS dans les périodes
#    Forme recommandée pour toute règle aux régimes hétérogènes.
#
# B) `type=<régime principal>` + `regime` par période (raffinement) :
#    Utilisé quand toutes les périodes partagent le même régime principal
#    et qu'on veut juste raffiner une sous-fenêtre vers plus restrictif.
#    Les raffinements doivent aller du plus permissif au plus restrictif :
#
#       interdiction > plafonnement > autorisation_sous_condition > libre
#
#    Une période ne peut PAS être plus permissive que le type parent.
#
# Le validator refuse les combinaisons absurdes. Voir `_check_regime_mixte`
# et `_check_regimes_coherents` dans validator.py.
#
# Valeurs possibles pour `regime` :
#   "interdiction" | "plafonnement" | "autorisation_sous_condition" | "libre"

exemple_regle_periodes_mixtes:
  regle:
    id: "r_colza_type_III_note5"
    # type=mixte : autorisation_sous_condition sur 01/09→15/10 puis
    # interdiction sur 15/10→15/01. Chaque période porte son `regime`.
    type: "mixte"
    periodes:
      - du: "01/09"
        au: "15/10"
        regime: "autorisation_sous_condition"
      - du: "15/10"
        au: "15/01"
        regime: "interdiction"
    code_prescription: "pc11"
    note: "note_5"


# ── Type "autorisation_sous_condition" ───────────────────────────────────────

exemple_regle_autorisation:
  regle:
    id: "r_autres_peu_charge_icpe_a"
    type: "autorisation_sous_condition"
    periodes:
      - du: "15/12"
        au: "15/01"
    code_prescription: "pc1"
    note: "note_1"
    texte_condition: "Sous réserve des dispositions du plan d'épandage ICPE."


# ── Type "plafonnement" ──────────────────────────────────────────────────────

exemple_regle_plafonnement:
  regle:
    id: "r_plafond_cine_avant_3112"
    type: "plafonnement"
    plafond_azote_kg_n_ha: 70
    code_prescription: "pc12"
    texte: "70 kg N/ha avant implantation du couvert."


# ── Type "libre" ─────────────────────────────────────────────────────────────

exemple_regle_libre:
  regle:
    id: "r_courte_type_0"
    type: "libre"
    plafonnement_associe: "r_plafond_cie_courte"   # optionnel


# ── Type "non_applicable" ────────────────────────────────────────────────────

exemple_regle_non_applicable:
  regle:
    id: "r_hors_zvn"
    type: "non_applicable"
    message: "La parcelle n'est pas en zone vulnérable aux nitrates."


# ── Type "calculatrice" ──────────────────────────────────────────────────────
# Délègue le rendu et le calcul à un composant nommé (côté backend Django),
# versionné côté code, paramétré par le YAML.
#
# Champs :
#   - composant       : identifiant du composant (liste blanche côté code)
#   - inputs_requis   : champs saisis par l'utilisateur dans la mini-UI
#   - parametres      : constantes réglementaires injectées au composant
#                       (périodes, délais, codes PC) — éditables par le métier
#                       sans toucher au code.
#
# Le YAML décrit QUOI (composant, inputs, paramètres réglementaires).
# Le composant Django décrit COMMENT (algo, rendu, messages, alertes, erreurs).
# Les fixtures de test du composant (ex: "fenêtre confortable", "J-20 absorbé"
# pour fenetre_epandage) vivent à côté du composant, pas dans le YAML.

exemple_regle_calculatrice:
  regle:
    id: "r_cipan_fenetre_epandage"
    type: "calculatrice"
    composant: "fenetre_epandage"
    inputs_requis:
      - "date_semis_couvert"
      - "date_destruction_prevue"
    parametres:
      periode_reglementaire:
        du: "15/11"
        au: "15/01"
      delai_avant_destruction_jours: 20
      code_prescription: "pc4"


# ─────────────────────────────────────────────────────────────────────────────
# DATES ET ÉVÉNEMENTS PHÉNOLOGIQUES
# ─────────────────────────────────────────────────────────────────────────────
# Une période est `{du: <date-ou-evenement>, au: <date-ou-evenement>}`.
# - date fixe : "JJ/MM" (ex: "15/12")
# - événement phénologique : nom prédéfini dans referentiels.yaml > evenements_phenologiques
#   (ex: "brunissement_soies", "destruction_couvert", "derniere_coupe_luzerne")

exemple_periode_phenologique:
  regle:
    id: "r_mais_principal"
    type: "interdiction"
    periodes:
      - du: "brunissement_soies"
        au: "15/02"


# ─────────────────────────────────────────────────────────────────────────────
# ARBRE RACINE
# ─────────────────────────────────────────────────────────────────────────────
# Le fichier arbre_decision_national.yaml contient un champ racine `arbre`
# qui est un `noeud` (typiquement le nœud catalogue ZVN à la racine).

exemple_racine:
  metadata:
    version: "..."
    source: "..."
  arbre:
    noeud:
      type_noeud: "catalogue"
      id: "n_zvn"
      champ: "en_zone_vulnerable"
      source: "sig"
      reference: "zone_vulnerable_nitrates"
      branches:
        - valeur: false
          regle: { id: "r_hors_zvn", type: "non_applicable" }
        - valeur: true
          noeud:
            type_noeud: "formulaire"
            niveau: "culture"
            # ...


# ─────────────────────────────────────────────────────────────────────────────
# VALIDATION (à enforcer en CI via grammaire.schema.json + script Python)
# ─────────────────────────────────────────────────────────────────────────────
# - Tout `id` est unique dans l'arbre
# - Tout `renvoi_vers` pointe vers un id existant
# - Tout `code_prescription` existe dans referentiels.yaml > codes_prescription
# - Toute `note` existe dans referentiels.yaml > notes
# - Toute branche a exactement UN de {noeud, regle, renvoi_vers}
# - Toutes les dates "JJ/MM" sont valides
# - Tout événement phénologique référencé existe dans referentiels.yaml
# - Toute `valeur` de branche existe dans le référentiel correspondant au champ
# - Sur tout chemin racine→feuille, les nœuds formulaire respectent l'ordre
#   culture → sous_culture → type_fertilisant → complement (sans retour, sans
#   doublon des 3 premiers niveaux)
# - Tout `composant` (règle calculatrice) existe dans la liste blanche côté code
# - Tout `input_requis` est connu du composant correspondant
# - Toute `reference` (nœud catalogue, source `mapping_referentiel`) existe
#   dans referentiels.yaml


# ─────────────────────────────────────────────────────────────────────────────
# SURCHARGES RÉGIONALES (PAR)
# ─────────────────────────────────────────────────────────────────────────────
# Un fichier par région : arbre_decision_par_<code>.yaml
# Format : liste d'overrides qui s'appliquent AVANT la résolution nationale.
# Chaque override désigne la règle nationale qu'il remplace et fournit la
# nouvelle règle.

exemple_override:
  metadata:
    region: "R44"
    version: "..."
    source_juridique: "arrêté préfectoral Grand Est 2024-XXX"
  overrides:
    - remplace: "r_colza_type_III_autres"
      par:
        regle:
          id: "r_colza_type_III_R44"
          type: "interdiction"
          periodes:
            - du: "01/09"
              au: "15/02"
          code_prescription: "pc4"

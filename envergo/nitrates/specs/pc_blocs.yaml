        - type: citation
          data:
            texte: Indicateur = bilan azoté post-récolte.
        - type: paragraphe
          data:
            texte: '• Autres sols :'
        - type: citation
          data:
            texte: Indicateur = reliquat azoté avant épandage.
        - type: titre_paragraphe
          data:
            texte: Le protocole et le nombre d'analyses
        - type: paragraphe

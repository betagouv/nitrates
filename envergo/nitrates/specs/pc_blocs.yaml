# Contenu riche des prescriptions conditionnées (carte #136).
# Indexé par identifiant PC ; seedé dans CodePrescription.blocs par
# seed_referentiels. Texte transcrit verbatim depuis le Notion.
# Le gras inline (doses) est porté par des segments {texte, gras}.

codes_prescription_blocs:
  pc1:
    schema: 1
    blocs:
    - type: titre_principal
      data:
        texte: Conditions à respecter pour épandre en période d'autorisation sous condition
    - type: titre_paragraphe
      data:
        texte: Le principe
    - type: paragraphe
      data:
        texte: L'épandage de certains fertilisants azotés peut être autorisé, le cas échéant, en période
          d'interdiction d'épandage.
    - type: titre_paragraphe
      data:
        texte: Les conditions cumulatives à remplir
    - type: paragraphe
      data:
        texte: 'Cet épandage est possible si :'
    - type: liste
      data:
        items:
        - texte: il s'inscrit dans un plan d'épandage soumis à autorisation et à étude d'impact ou d'incidence
        - texte: l'étude démontre l'innocuité de la pratique
        - texte: un dispositif de surveillance des teneurs en azote nitrique et ammoniacal des eaux lixiviées
            est mis en place
    - type: titre_paragraphe
      data:
        texte: La dose maximale
    - type: paragraphe
      data:
        texte:
        - texte: 'La dose maximale '
        - texte: par hectare
          gras: true
        - texte: ', depuis la récolte de la culture précédente, peut être portée à '
        - texte: 100 kg d'azote potentiellement libéré jusqu'en sortie d'hiver
          gras: true
        - texte: .
    - type: titre_paragraphe
      data:
        texte: Les règles sur le couvert d'interculture (CI)
    - type: paragraphe
      data:
        texte: 'Le couvert végétal d''interculture doit être :'
    - type: liste
      data:
        items:
        - texte: implanté précocement
        - texte: maintenu au minimum 14 semaines

    - type: titre_paragraphe
      data:
        texte: Le principe
    - type: paragraphe
      data:
        texte: Vous pouvez réaliser un apport supplémentaire de fertilisants azotés sous forme minérale
          sur votre colza en végétation, dans les conditions ci-dessous.
    - type: titre_paragraphe
      data:
        texte: La dose et la période
    - type: liste
      data:
        items:
        - texte: 'Dose maximale : 30 unités d''azote sous forme minérale'
        - texte: 'Quand : à partir du stade "4 feuilles"'
    - type: titre_paragraphe
      data:
        texte: Les situations où cet apport est possible
    - type: paragraphe
      data:
        texte: 'Cet apport est possible dans les situations où la disponibilité en azote du sol pendant
          l''automne est limitée, c''est-à-dire dans les cas où :'
    - type: liste
      data:
        items:
        - texte: vous n'avez pas réalisé d'apport de fertilisants azotés de types 0, I.a, I.b et II avant
            le 1er septembre correspondant à plus de 30 unités d'azote efficaces,
        - texte: et votre semis de colza est réalisé avant le 25 août,
        - texte: 'et au moins une des conditions suivantes est respectée :'
          enfants:
          - texte: implantation du colza après un précédent de céréale à pailles avec résidus de culture
              enfouis et fréquence historique d'apport de fertilisants de types 0, I.a, I.b et II inférieure
              à une année sur trois,
          - texte: ou sols à faible disponibilité en azote (précisés par le programme d'actions régional).

        - type: titre_paragraphe
          data:
            texte: Un suivi d'indicateurs de risque de lixiviation
        - type: paragraphe
          data:
            texte: Les îlots culturaux concernés en interculture longue font l'objet d'un suivi d'indicateurs
              de risque de lixiviation des composés azotés. Vous transmettez les résultats à l'administration
              en suivant les informations demandées par le programme d'actions régional, notamment le
              précédent cultural. Vous tenez à disposition les justificatifs prévus par le programme d'actions
              régional.
        - type: titre_paragraphe
          data:
            texte: L'indicateur à utiliser dépend de la nature de votre sol
        - type: liste
          data:
            items:
            - texte: 'Sols impropres à la réalisation de reliquats au début de la période de drainage
                ou en post-récolte (définis par le programme d''actions régional) : indicateur = bilan
                azoté post-récolte'
            - texte: 'Autres sols : indicateur = reliquat azoté avant épandage'
        - type: titre_paragraphe
          data:
            texte: Le protocole et le nombre d'analyses
        - type: paragraphe
          data:
            texte: Le protocole à respecter est défini par le programme d'actions régional.
        - type: paragraphe
          data:
            texte: Une analyse est réalisée pour chaque îlot cultural représentatif concerné par ces épandages.
              Les îlots représentatifs sont définis par le programme d'actions régional, au moins en fonction
              du type de précédent cultural.
        - type: paragraphe
          data:
            texte: 'Le nombre minimum d''analyses par exploitation suit la formule suivante :'
        - type: citation
          data:
            texte: Surface concernée (ha) ÷ 20 = nombre d'analyses
        - type: paragraphe
          data:
            texte: 'Avec une contrainte supplémentaire : au moins une analyse par famille de précédent
              cultural présente sur la surface concernée. Les familles de précédent cultural sont :'
        - type: liste
          data:
            items:
            - texte: céréales et pseudo-céréales
            - texte: oléagineux
            - texte: protéagineux et légumineuses
            - texte: légumes et fruits
            - texte: autres

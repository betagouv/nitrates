# Snapshot Miro — branche "culture principale"
#
# Date du snapshot : 2026-05-08
# Source : board Miro métier (capture intégrale des branches culture
# principale telles que peintes par les juristes).
#
# Convention :
#   - chaque entrée du tableau `branches` correspond à UNE branche culture
#     principale (= un nœud racine de l'arbre, hors filtre "résolution
#     ECG concernée par zone nitrate" / "sol non couvert" / "sol végétal"
#     qui ne sont PAS dans la culture principale).
#   - chaque feuille = une combinaison testable {culture, type fertilisant,
#     questions intermédiaires, zonage} qui doit produire le résultat
#     attendu (interdiction / autorisation conditionnelle / code PC).
#   - les périodes sont écrites EXACTEMENT comme dans le screenshot
#     (jj/mm sans année, parfois avec "puis" pour les fenêtres composées).
#   - `screenshot` pointe vers le PNG horodaté de la même branche dans
#     ce dossier. C'est la preuve visuelle pour comparer le rendu de
#     l'application au peint juriste.
#
# Codes PC référencés dans ce snapshot :
#   PC1   = "ICPE A"
#   PC5   = "culture irriguée"
#   PC6   = "effluents peu chargés en fertirrigation"
#   PC7   = "effluent peu chargé"
#   PC10  = "IAA luzerne + ICPE A"
#   PC11  = "colza"
#
# Notes (zonages réglementaires) référencées :
#   Note 5 = Régions PACA, Occitanie + départements Dordogne, Gironde,
#            Landes, Lot-et-Garonne, Pyrénées-Atlantiques
#   Note 6 = autre région et/ou départements (complémentaire de note 7)
#   Note 7 = Régions PACA, Occitanie et département Pyrénées-Atlantique
#            (au singulier dans le screenshot)
#   Note 12 = fertilisant issu du traitement et/ou de la transformation
#             de matière première en vue de la fabrication d'alimentation
#             humaine ou animale
#
# Types de fertilisant (constants sur tout l'arbre) :
#   Type 0   = engrais minéraux
#   Type I   = effluents type I (fumiers compacts pailleux, composts...)
#   Type Ia  = sous-type I (apparaît en culture de printemps)
#   Type Ib  = sous-type I (apparaît en culture de printemps)
#   Type II  = effluents type II (lisiers, fientes, etc.)
#   Type III = engrais minéraux azotés de synthèse


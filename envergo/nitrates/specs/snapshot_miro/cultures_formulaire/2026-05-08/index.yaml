  - "Distinction prairie permanente vs prairie >6 mois non permanente : la PC16 'plafond prairie' s'applique uniquement aux permanentes. Le formulaire doit-il poser une question supplémentaire ou est-ce déduit ?"
  - "Les 2 sous-catégories 'Prairie de moins de 6 mois' (automne/été vs printemps) ne sont pas dans le snapshot culture_principale/2026-05-08. À snapshoter quand juriste validera ces branches."

# =============================================================================
# RÉFÉRENTIELS — listes fermées utilisées dans l'arbre de décision
# =============================================================================
# Modifier ce fichier uniquement si la réglementation change (nouveau type de
# fertilisant reconnu, nouveau code PC, etc.).
# Source : Tdb - Reglementation Nitrate - Table Correspondance codes + PDF Types fertilisants.
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# TYPES DE FERTILISANTS (selon arrêté PAN)
# ─────────────────────────────────────────────────────────────────────────────
# Chaque type a des règles d'épandage distinctes. Le type est déduit du
# fertilisant saisi par l'utilisateur (voir mapping fertilisant_utilisateur → type).
# ─────────────────────────────────────────────────────────────────────────────

types_fertilisants:
  type_0:
    libelle_court: "Type 0"
    libelle_public: "Boues, marcs, composts murs"
    description: |
      Produits organiques caractérisés par une organisation nette à moyen
      terme de l'azote.
    exemples:
      - "Boues de papeterie"
      - "Marcs de raisins frais"
      - "Composts de déchets verts jeunes et ligneux"

  type_Ia:
    libelle_court: "Type Ia"
    libelle_public: "Fumiers compacts, composts murs (sauf fientes de volailles)"
    description: |
      Produits organiques à minéralisation d'azote très lente et contenant
      une faible quantité d'azote minéral.
    exemples:
      - "Fumiers compacts non susceptibles d'écoulement"
      - "Composts d'effluents d'élevage (hors composts de fientes de volailles)"
      - "Composts matures de déchets verts, composts d'ordures ménagères résiduelles"
      - "Composts de marcs de raisins"
      - "Composts de fractions solides de digestats de méthanisation"

  type_Ib:
    libelle_court: "Type Ib"
    libelle_public: "Déjections animales avec litière (sauf fientes de volailles), composts de biodéchets"
    description: |
      Produits organiques à minéralisation d'azote lente et contenant une
      quantité limitée d'azote minéral.
    exemples:
      - "Déjections animales avec litière ne répondant pas aux critères du type Ia"
      - "Composts de MIATE (matières d'intérêt agronomique issues du traitement des eaux) mélangées à un support carboné"
      - "Composts de biodéchets"

  type_II:
    libelle_court: "Type II"
    libelle_public: "Déjections animales sans litière, farines animales, tourteaux, guanos, digestats"
    description: |
      Produits organiques à minéralisation d'azote rapide ou contenant une
      quantité importante d'azote minéral.
    exemples:
      - "Déjections sans litière de ruminants, d'équins, de porcins et de volaille"
      - "Fumiers de volailles"
      - "Fientes de volailles y compris séchées"
      - "Fractions liquides issues d'un raclage en V en élevage porcin"
      - "Fractions liquides issues de la séparation de phase des lisiers"
      - "Effluents peu chargés"
      - "Vinasses de betterave"
      - "Farines de plumes, de poisson, de sang, d'os, soies de porcs, tourteaux de ricin, guanos d'oiseaux marins"
      - "Eaux résiduaires"
      - "Digestats bruts de méthanisation"
      - "Fractions liquides des digestats de méthanisation"

  type_III:
    libelle_court: "Type III"
    libelle_public: "Engrais de synthèse"
    description: |
      Fertilisants azotés minéraux et uréiques de synthèse, y compris en
      fertirrigation.

  # Types "transverses" : flags qui s'ajoutent à un type principal
  effluent_peu_charge:
    libelle_public: "Effluent peu chargé"
    est_un_flag: true
    description: |
      Effluent issu d'une dilution par les eaux de pluie, de lavage, ou de
      traitement. Autorise des assouplissements (notes 8-11).

  fertilisant_iaa:
    libelle_public: "Fertilisant issu d'Industrie Agro-Alimentaire (IAA)"
    est_un_flag: true
    description: |
      Fertilisant issu du traitement/transformation de matières premières
      pour fabrication de produits alimentaires, aliments animaux,
      préparation/conditionnement de vins, ou distillation d'alcools de
      bouche d'origine agricole.

# ─────────────────────────────────────────────────────────────────────────────
# OCCUPATIONS DU SOL
# ─────────────────────────────────────────────────────────────────────────────

occupations_sol:
  culture_principale:
    libelle_public: "Culture principale"
  couvert_intercultures:
    libelle_public: "Couvert végétal d'interculture"
  prairie:
    libelle_public: "Prairie"
  sol_non_cultive:
    libelle_public: "Sol non cultivé"

# ─────────────────────────────────────────────────────────────────────────────
# CATÉGORIES DE CULTURE / COUVERT (cf. PDF mapping form -> arbres)
# ─────────────────────────────────────────────────────────────────────────────
# Source : Tdb_mapping_form_culture_couvert_2026-05-06.pdf
#
# Logique cascade frontend (3 niveaux comme pour les fertilisants) :
#   1. Catégorie de culture/couvert (visible)        : ex "Culture d'hiver"
#   2. Sous-catégorie (visible)                      : ex "Colza"
#   3. Branche d'arbre cible (caché, envoyé backend) : ex sous_culture=colza
#
# Le 3e niveau est résolu par `mapping_sous_culture_vers_branche` ci-dessous.
# Les valeurs cibles (`occupation_sol`, `sous_culture`) sont strictement
# celles utilisées dans `arbre_decision_national.yaml` sur les nœuds
# `formulaire/occupation_sol` puis `formulaire/sous_culture`.
# ─────────────────────────────────────────────────────────────────────────────

categories_cultures:

  sol_non_cultive:
    libelle_public: "Sol non cultivé"
    sous_cultures: []  # cas direct, pas de sous-catégorie

  culture_hiver:
    libelle_public: "Culture d'hiver (culture principale implantée l'année civile en cours et récoltée l'année suivante)"
    sous_cultures:
      - "colza"
      - "culture_principale_hiver_autre_que_colza"

  culture_printemps:
    libelle_public: "Culture de printemps (culture principale implantée et récoltée pendant la même année civile)"
    sous_cultures:
      - "mais"
      - "culture_principale_printemps_autre_que_mais"

  prairies_ou_luzerne:
    libelle_public: "Prairies ou luzerne"
    sous_cultures:
      - "luzerne"
      - "prairie_plus_6_mois"
      - "prairie_permanente"
      - "prairie_moins_6_mois_printemps"
      - "prairie_moins_6_mois_automne"

  autres_cultures_principales:
    libelle_public: "Autres cultures principales (cultures pérennes, vergers, vignes, cultures maraîchères et cultures porte-graines)"
    sous_cultures:
      - "cultures_florales_aromatiques"
      - "cultures_maraicheres_legumieres"
      - "cultures_porte_graines"
      - "cultures_perennes_vergers_vignes"

  couvert_intercultures_longue:
    libelle_public: "Couvert d'interculture longue"
    sous_cultures:
      - "couvert_recolte_plus_en_place_apres_3112"
      - "couvert_recolte_toujours_en_place_apres_0101"
      - "couvert_non_recolte_plus_en_place_apres_3112"
      - "couvert_non_recolte_toujours_en_place_apres_0101"

  couvert_intercultures_courte:
    libelle_public: "Couvert d'interculture courte"
    sous_cultures:
      - "couvert_courte_recolte"
      - "couvert_courte_non_recolte"

# ─────────────────────────────────────────────────────────────────────────────
# SOUS-CULTURES (libellés affichés dans le formulaire)
# ─────────────────────────────────────────────────────────────────────────────

sous_cultures:

  # ── Culture d'hiver ────────────────────────────────────────────────────────
  colza:
    libelle_public: "Colza"
  culture_principale_hiver_autre_que_colza:
    libelle_public: "Culture principale d'hiver autre que colza"

  # ── Culture de printemps ───────────────────────────────────────────────────
  mais:
    libelle_public: "Maïs"
  culture_principale_printemps_autre_que_mais:
    libelle_public: "Culture principale de printemps autre que maïs"

  # ── Prairies ou luzerne ────────────────────────────────────────────────────
  luzerne:
    libelle_public: "Luzerne"
  prairie_plus_6_mois:
    libelle_public: "Prairie implantée depuis plus de 6 mois"
  prairie_permanente:
    libelle_public: "Prairie permanente"
    description: |
      Sous-catégorie distincte pour pouvoir afficher le code prescription
      PC16 "plafond prairie" (peu importe le type de fertilisant).
      cf. PDF mapping_form_culture_couvert.
  prairie_moins_6_mois_printemps:
    libelle_public: "Prairie de moins de 6 mois implantée au printemps"
  prairie_moins_6_mois_automne:
    libelle_public: "Prairie de moins de 6 mois implantée à l'automne ou en fin d'été"

  # ── Autres cultures principales (vergers, vignes, etc.) ────────────────────
  cultures_florales_aromatiques:
    libelle_public: "Cultures florales et aromatiques"
  cultures_maraicheres_legumieres:
    libelle_public: "Cultures maraîchères et légumières de plein champ"
  cultures_porte_graines:
    libelle_public: "Cultures porte-graines"
  cultures_perennes_vergers_vignes:
    libelle_public: "Cultures pérennes (vergers, vignes)"

  # ── Couvert d'interculture longue ──────────────────────────────────────────
  couvert_recolte_plus_en_place_apres_3112:
    libelle_public: "Couvert récolté, fauché ou pâturé (dérobée, CIVE...) plus en place après le 31 décembre"
  couvert_recolte_toujours_en_place_apres_0101:
    libelle_public: "Couvert récolté, fauché ou pâturé (dérobée, CIVE...) toujours en place après le 1er janvier"
  couvert_non_recolte_plus_en_place_apres_3112:
    libelle_public: "Couvert ni récolté, ni fauché, ni pâturé (CIPAN, engrais vert...) plus en place après le 31 décembre"
  couvert_non_recolte_toujours_en_place_apres_0101:
    libelle_public: "Couvert ni récolté, ni fauché, ni pâturé (CIPAN, engrais vert...) toujours en place après le 1er janvier"

  # ── Couvert d'interculture courte ──────────────────────────────────────────
  couvert_courte_recolte:
    libelle_public: "Couvert récolté, fauché ou pâturé (dérobée, CIVE...)"
  couvert_courte_non_recolte:
    libelle_public: "Couvert ni récolté, ni fauché, ni pâturé (CIPAN, engrais vert...)"

# ─────────────────────────────────────────────────────────────────────────────
# MAPPING SOUS-CULTURE -> BRANCHE ARBRE
# ─────────────────────────────────────────────────────────────────────────────
# Résout côté frontend l'appartenance d'une sous-culture à une branche de
# l'arbre. Retourne un dict :
#   - occupation_sol : valeur de la branche niveau 1 de l'arbre
#                      (sol_non_cultive / culture_principale / couvert_intercultures)
#   - sous_culture   : valeur de la branche niveau 2 (colza / culture_printemps /
#                      culture_hiver_hors_colza / etc.)
#   - flags          : champs supplémentaires à pré-remplir dans le contexte
#                      pour court-circuiter une question subsidiaire (ex
#                      `culture_irriguee_type=mais` quand l'user a déjà choisi
#                      maïs en sous-catégorie ; PC16 prairie permanente).
#
# Validé par grep sur arbre_decision_national.yaml le 2026-05-06.
# ─────────────────────────────────────────────────────────────────────────────

mapping_sous_culture_vers_branche:

  # ── Culture d'hiver ────────────────────────────────────────────────────────
  colza:
    occupation_sol: "culture_principale"
    sous_culture: "colza"
  culture_principale_hiver_autre_que_colza:
    occupation_sol: "culture_principale"
    sous_culture: "culture_hiver_hors_colza"

  # ── Culture de printemps ───────────────────────────────────────────────────
  mais:
    occupation_sol: "culture_principale"
    sous_culture: "culture_printemps"
    # Pré-remplit la question subsidiaire culture_irriguee_type pour
    # court-circuiter sa redemande à l'arbre (cf. r_printemps_III_mais_irrigue).
    flags:
      culture_irriguee_type: "mais"
  culture_principale_printemps_autre_que_mais:
    occupation_sol: "culture_principale"
    sous_culture: "culture_printemps"

  # ── Prairies ou luzerne ────────────────────────────────────────────────────
  luzerne:
    occupation_sol: "culture_principale"
    sous_culture: "luzerne"
  prairie_plus_6_mois:
    occupation_sol: "culture_principale"
    sous_culture: "prairie_plus_6_mois"
  prairie_permanente:
    occupation_sol: "culture_principale"
    sous_culture: "prairie_plus_6_mois"
    # Flag PC16 plafond prairie (cf. PDF mapping). Le code de prescription
    # PC16 doit être affiché côté résultat peu importe le type fertilisant
    # quand ce flag est present. Logique d'affichage à implémenter côté
    # template.
    flags:
      prairie_permanente: true
  prairie_moins_6_mois_printemps:
    occupation_sol: "culture_principale"
    sous_culture: "culture_printemps"
  prairie_moins_6_mois_automne:
    occupation_sol: "culture_principale"
    sous_culture: "culture_hiver_hors_colza"

  # ── Autres cultures principales ────────────────────────────────────────────
  cultures_florales_aromatiques:
    occupation_sol: "culture_principale"
    sous_culture: "autres_cultures"
  cultures_maraicheres_legumieres:
    occupation_sol: "culture_principale"
    sous_culture: "autres_cultures"
  cultures_porte_graines:
    occupation_sol: "culture_principale"
    sous_culture: "autres_cultures"
  cultures_perennes_vergers_vignes:
    occupation_sol: "culture_principale"
    sous_culture: "autres_cultures"

  # ── Couvert d'interculture longue ──────────────────────────────────────────
  # 4 cas du PDF -> 4 branches d'arbre existantes (cf. q_interculture_longue_type).
  couvert_recolte_plus_en_place_apres_3112:
    occupation_sol: "couvert_intercultures"
    sous_culture: "interculture_longue"
    flags:
      sous_culture_couvert: "cie_avant_3112"
  couvert_recolte_toujours_en_place_apres_0101:
    occupation_sol: "couvert_intercultures"
    sous_culture: "interculture_longue"
    flags:
      sous_culture_couvert: "cine_apres_0101"
  couvert_non_recolte_plus_en_place_apres_3112:
    occupation_sol: "couvert_intercultures"
    sous_culture: "interculture_longue"
    flags:
      sous_culture_couvert: "cine_avant_3112"
  couvert_non_recolte_toujours_en_place_apres_0101:
    occupation_sol: "couvert_intercultures"
    sous_culture: "interculture_longue"
    flags:
      sous_culture_couvert: "cine_apres_0101"

  # ── Couvert d'interculture courte ──────────────────────────────────────────
  couvert_courte_recolte:
    occupation_sol: "couvert_intercultures"
    sous_culture: "interculture_courte"
    flags:
      sous_culture_couvert: "cie_courte"
  couvert_courte_non_recolte:
    occupation_sol: "couvert_intercultures"
    sous_culture: "interculture_courte"
    flags:
      sous_culture_couvert: "cine_courte"

  # ── Sol non cultivé (cas direct sans sous-catégorie) ───────────────────────
  # Pas dans la cascade niveau 2, traité au niveau 1 directement.
  # L'utilisateur sélectionne "Sol non cultivé" en catégorie -> on saute le
  # select sous-catégorie et on envoie sous_culture=sol_non_cultive direct.

# ─────────────────────────────────────────────────────────────────────────────
# OCCUPATIONS DU SOL — DEPRECATED (utiliser categories_cultures ci-dessus)
# ─────────────────────────────────────────────────────────────────────────────
# Conservé pour rétrocompat avec le formulaire actuel le temps du switch.
# À retirer quand la cascade `categorie_culture` + `sous_culture` est active
# sur tous les flow.

# ─────────────────────────────────────────────────────────────────────────────
# STATUT ICPE (installation classée protection environnement)
# ─────────────────────────────────────────────────────────────────────────────

statut_icpe:
  non_concerne:
    libelle_public: "Pas concerné par un plan d'épandage"
  icpe_a:
    libelle_court: "ICPE A"
    libelle_public: "Soumis à autorisation (ICPE A)"
  icpe_e:
    libelle_court: "ICPE E"
    libelle_public: "Soumis à enregistrement (ICPE E)"
  icpe_d:
    libelle_court: "ICPE D"
    libelle_public: "Soumis à déclaration (ICPE D)"

# ─────────────────────────────────────────────────────────────────────────────
# CODES DE PRESCRIPTION (PC1 à PC15)
# ─────────────────────────────────────────────────────────────────────────────
# Source : Tdb - Reglementation Nitrate _table_correspondance_codes_28-04-26.pdf
# (versions du 21/04/26 et du 28/04/26 strictement identiques — pas de
# changement réglementaire entre les deux dates).
#
# Pour chaque code, deux niveaux de texte :
#   - texte_court               : rédaction simplifiée "propositions Karine"
#                                 destinée à l'affichage utilisateur (webapp)
#   - texte_redaction_initiale  : version juridique brute issue de l'arrêté,
#                                 conservée pour traçabilité réglementaire
#                                 (à afficher en "voir détail réglementaire")
#
# Mention "à afficher tout le temps" (post-it Karine) : voir flag `toujours_affiche`.
# Mention "infos de dates à enlever" sur PC2/PC3 : flag `dates_a_extraire` —
# les dates sont à présenter via l'affichage des périodes d'interdiction, pas
# en duplication dans le texte du PC.
# ─────────────────────────────────────────────────────────────────────────────

codes_prescription:

  pc1:
    mots_cles: "ICPE A"
    note_reglementaire: "note_1"
    type: "epandage_conditionne"
    texte_court: |
      Épandage autorisé dans la limite de 100 kg d'azote par hectare dans le
      cadre d'un plan d'épandage soumis à autorisation et à étude d'impact ou
      d'incidence démontrant l'innocuité de cette pratique et d'un dispositif
      de surveillance des teneurs en azote nitrique et ammoniacal des eaux
      lixiviées.
    texte_redaction_initiale: |
      L'épandage de fertilisants azotés de type 0, de type I.a et d'effluents
      peu chargés peut être autorisé en période d'interdiction d'épandage, le
      cas échéant, dans la limite d'une dose maximale pouvant être portée à
      100 kg d'azote potentiellement libéré jusqu'en sortie d'hiver par hectare
      depuis la récolte de la culture précédente, dans le cadre d'un plan
      d'épandage soumis à autorisation et à étude d'impact ou d'incidence,
      sous réserve que cette dernière démontre l'innocuité d'une telle pratique
      et qu'un dispositif de surveillance des teneurs en azote nitrique et
      ammoniacal des eaux lixiviées. Par ailleurs, le couvert végétal
      d'interculture doit être implanté précocement et maintenu au minimum
      14 semaines. Les épandages ne sont pas possibles avant 4 semaines après
      implantation du CI et à partir de 20 jours avant la récolte ou la
      destruction du CI.

  pc2:
    mots_cles: "IAA + ICPE A"
    note_reglementaire: "note_1"
    type: "epandage_conditionne"
    dates_a_extraire: true
    texte_court: |
      Épandage de fertilisants issus de processus alimentaires ou faiblement
      dosés en azote autorisé, sous réserve d'une surveillance des reliquats.
    texte_redaction_initiale: |
      L'épandage de fertilisants azotés issus de traitement et transformation
      de matières premières en vue de la fabrication de produits alimentaires
      ou d'aliments pour animaux, de la préparation et du conditionnement de
      vins, ou de la production par distillation d'alcools de bouche d'origine
      agricole, qui n'entrent pas dans la définition des types 0, I.a ou
      effluents peu chargés est possible dans les mêmes conditions, et sous
      réserve qu'un dispositif de surveillance des reliquats azotés sous le
      couvert installé, et avant épandage, soit mis en place dans le périmètre
      d'épandage, dans les conditions prévues au 5° du VII de la présente annexe.

  pc3:
    mots_cles: "IAA + ICPE D ou E"
    note_reglementaire: "note_2"
    type: "epandage_conditionne"
    dates_a_extraire: true
    texte_court: |
      Épandage de fertilisants issus de processus alimentaires autorisé dans
      la limite de 70 kg d'azote par hectare, dans le cadre d'un plan
      d'épandage soumis à déclaration ou enregistrement et sous réserve d'une
      surveillance des reliquats azotés sous le couvert installé.
    texte_redaction_initiale: |
      L'épandage de fertilisants azotés issus de traitement et transformation
      de matières premières en vue de la fabrication de produits alimentaires
      ou d'aliments pour animaux, de la préparation et du conditionnement de
      vins, ou de la production par distillation d'alcools de bouche d'origine
      agricole, peut être autorisé en période d'interdiction, le cas échéant,
      dans la limite d'une dose maximale pouvant être portée à 70 kg N d'azote
      potentiellement libéré jusqu'en sortie d'hiver par hectare depuis la
      récolte du précédent, dans le cadre d'un plan d'épandage soumis
      déclaration ou enregistrement, sous réserve qu'un dispositif de
      surveillance des reliquats azotés sous le couvert installé, et avant
      épandage, soit mis en place dans le périmètre d'épandage, dans les
      conditions prévues au 5° du VII de la présente annexe. Par ailleurs, le
      couvert végétal d'interculture doit être implanté précocement et
      maintenu au minimum 14 semaines. Les épandages ne sont pas possibles
      avant 4 semaines après implantation du CI et à partir de 20 jours avant
      la récolte ou la destruction du CI.

  pc4:
    mots_cles: "non ICPE A"
    note_reglementaire: "note_3"
    type: "epandage_conditionne"
    texte_court: |
      Épandage autorisé selon les conditions du programme d'actions régional,
      avec un suivi des reliquats azotés avant épandage.
    texte_redaction_initiale: |
      L'épandage d'effluents d'élevage de type I.a, I.b et II autre que les
      effluents peu chargés en période d'interdiction est possible jusqu'à
      20 jours avant la récolte ou la destruction du CI, et dans des conditions
      définies par le programme d'actions régional, notamment sur la durée et
      la période de présence du couvert et sur le plafonnement des apports à
      cette période, en vue de limiter les fuites de composés azotés dans
      l'eau. Dans ce cas, un dispositif de suivi des reliquats azotés avant
      épandage est mis en place, dans les conditions prévues au 5° du VII de
      la présente annexe.

  pc5:
    mots_cles: "culture irriguée"
    note_reglementaire: "note_4"
    type: "epandage_conditionne"
    texte_court: |
      Apport d'engrais minéraux autorisé.
    texte_redaction_initiale: |
      En présence d'une culture irriguée, l'apport de fertilisants azotés de
      type III est autorisé jusqu'au 15 juillet et, sur maïs irrigué, jusqu'au
      stade du brunissement des soies du maïs.

  pc6:
    mots_cles: "effluent peu chargé fertirrigation"
    note_reglementaire: "note_8"
    type: "epandage_conditionne"
    toujours_affiche: true   # Mesure 6 — à afficher tout le temps (post-it Karine)
    texte_court: |
      Fertirrigation avec des effluents faiblement dosés en azote autorisée
      dans la limite de 50 kg d'azote par hectare.
    texte_redaction_initiale: |
      En présence d'une culture, l'épandage d'effluents peu chargés en
      fertirrigation est autorisé jusqu'au 31 août, dans la limite de 50 kg
      d'azote efficace en été par hectare à compter du 1er juillet. L'azote
      efficace en été est défini comme la somme de l'azote présent dans
      l'effluent peu chargé sous forme minérale et sous forme organique
      minéralisable entre le 1er juillet et le 31 août.

  pc7:
    mots_cles: "effluent peu chargé"
    note_reglementaire: "note_9"
    type: "epandage_conditionne"
    texte_court: |
      Épandage des effluents faiblement dosés en azote autorisé dans la
      limite de 20 kg d'azote par hectare.
    texte_redaction_initiale: |
      L'épandage des effluents peu chargés est autorisé dans cette période
      dans la limite de 20 kg d'azote potentiellement libéré jusqu'en sortie
      d'hiver par hectare à compter du 15 novembre. L'azote potentiellement
      libéré jusqu'en sortie d'hiver est défini comme la somme de l'azote
      présent dans l'effluent peu chargé sous forme minérale et sous forme
      organique minéralisable entre le 15 novembre et le 15 janvier.

  pc8:
    mots_cles: "effluent peu chargé élevage + non ICPE A"
    note_reglementaire: "note_10"
    type: "epandage_conditionne"
    toujours_affiche: true   # Mesure 8 — à afficher tout le temps (post-it Karine)
    texte_court: |
      Épandage d'effluents faiblement dosés en azote issus d'élevages dans la
      limite de 20 kg d'azote par hectare.
    texte_redaction_initiale: |
      L'épandage après le 15 octobre d'effluents peu chargés issus d'élevages
      est possible jusqu'au 15 novembre. Ces apports sont limités à 20 kg
      d'azote potentiellement libéré jusqu'en sortie d'hiver par hectare. Ces
      apports rentrent dans le calcul du plafonnement des apports à compter
      de la récolte du précédent du CI, fixé à 70 kg N potentiellement libéré
      jusqu'en sortie d'hiver.

  pc9:
    mots_cles: "effluent peu chargé élevage + non ICPE A"
    note_reglementaire: "note_11"
    type: "epandage_conditionne"
    texte_court: |
      Épandage d'effluents faiblement dosés en azote issus d'élevages dans la
      limite de 20 kg d'azote par hectare.
    texte_redaction_initiale: |
      L'épandage après le 15 octobre d'effluents peu chargés issus d'élevages
      est possible jusqu'à 20 jours avant la récolte ou la destruction du CI.
      Ces apports sont limités à 20 kg d'azote potentiellement libéré jusqu'en
      sortie d'hiver par hectare. Ces apports rentrent dans le calcul du
      plafonnement des apports à compter de la récolte du précédent du CI,
      fixé à 70 kg N potentiellement libéré jusqu'en sortie d'hiver.

  pc10:
    mots_cles: "IAA luzerne + ICPE A"
    note_reglementaire: "note_12"
    type: "epandage_conditionne"
    note_seconde_partie_a_clarifier: true   # Voir post-it Karine sur note 12
    texte_court: |
      Épandage de fertilisants issus de processus alimentaires autorisé dans
      le cadre d'un plan d'épandage soumis à autorisation et à étude d'impact
      ou d'incidence démontrant l'innocuité de cette pratique et d'un
      dispositif de surveillance des reliquats azotés.
    texte_redaction_initiale: |
      L'épandage de fertilisants azotés issus de traitement et transformation
      des matières premières en vue de la fabrication de produits alimentaires
      ou d'aliments pour animaux peut être autorisé sur luzerne après la
      dernière coupe de l'année, dans le cadre d'un plan d'épandage soumis à
      autorisation et à étude d'impact ou d'incidence, sous réserve que cette
      dernière démontre l'innocuité d'une telle pratique et qu'un dispositif
      de surveillance des reliquats azotés avant épandage, soit mis en place
      dans le périmètre d'épandage.

      Le dispositif de surveillance des reliquats azotés est précisé par le
      programme d'actions régional. Les îlots culturaux concernés par ces
      épandages font l'objet d'un suivi d'indicateurs de risque de lixiviation
      des composés azotés. Les résultats des indicateurs sont transmis à
      l'administration. Le programme d'actions régional précise les
      informations à indiquer par l'agriculteur lors de la transmission à
      l'administration. Le cas échéant, l'agriculteur tient à disposition les
      justificatifs prévus par le programme d'actions régional. Dans le cas
      de sols impropres à la réalisation de reliquats au début de la période
      de drainage ou post-récolte, l'indicateur de risque de lixiviation est
      le bilan azoté post-récolte. Les sols impropres à la réalisation de
      reliquats sont définis par le programme d'actions régional. Dans le cas
      contraire, l'indicateur de risque de lixiviation est le reliquat azoté
      avant épandage. Le programme d'actions régional définit le protocole à
      respecter pour la réalisation de ces analyses. Une analyse est réalisée
      pour chaque îlot cultural représentatif. Les îlots culturaux sont
      définis par le programme d'actions régional. Les îlots culturaux
      représentatifs sont définis de sorte que le nombre d'analyses à réaliser
      par exploitation soit au moins supérieur ou égal à la surface de
      l'exploitation concernée par les épandages divisée par 20.

  # ⚠️ MAJ 2026-05-04 : insertion d'un nouveau pc11 "colza" + décalage
  # de tous les plafonnements (ex-pc11 → pc12, ex-pc12 → pc13, etc.) et
  # ajout d'un nouveau pc16 "Plafond prairies".
  # Source : Tdb - Reglementation Nitrate_table_correspondance_codes_2026-05-04.csv
  # Ce changement est cohérent avec l'arbre où pc11 est utilisé sur le Type III
  # colza (cf. r_colza_type_III_note5 et r_colza_type_III_autres).
  # Note 13 a été redéfinie en parallèle (cf. plus bas) : elle décrit la
  # condition d'apport conditionnel +30 unités d'azote sous forme minérale,
  # stade 4 feuilles, entre le 1er septembre et le 15 octobre.

  pc11:
    mots_cles: "colza"
    note_reglementaire: "note_13"
    type: "epandage_conditionne"
    texte_court: |
      Apport supplémentaire de 30 unités d'azote sous forme minérale autorisé
      en végétation sur colza à partir du stade « 4 feuilles », entre le
      1er septembre et le 15 octobre, dans les conditions précisées par
      la note 13.
    texte_redaction_initiale: |
      Un apport d'un maximum de 30 unités d'azote supplémentaires sous forme
      minérale, en végétation à partir du stade « 4 feuilles » est possible
      entre le 1er septembre et le 15 octobre, dans les situations où la
      disponibilité en azote du sol pendant l'automne est limitée, c'est-à-dire
      dans les cas où :
        – il n'est pas réalisé d'apport de fertilisant azoté de types 0,
          I.a, I.b et II avant le 1er septembre correspondant à plus de
          30 unités d'azote efficaces,
        – et où le semis du colza est réalisé avant le 25 août,
        – et où au moins une des conditions suivantes est respectée :
            – implantation du colza après un précédent céréale à pailles
              avec résidus de culture enfouis et fréquence historique
              d'apport de fertilisants de types 0, I.a, I.b et II
              inférieure à une année sur trois,
            – ou sols à faible disponibilité en azote (précisés par le
              programme d'actions régional).

  pc12:
    mots_cles: "Plafond CI post 31/12"
    type: "plafonnement_apports"
    texte_court: |
      Cumul de 70 kg d'azote par hectare durant l'année de l'implantation du
      couvert d'interculture.
    texte_redaction_initiale: |
      Apports réalisés durant l'année de l'implantation du CI, et à compter
      de la récolte du précédent, plafonnés à 70 kg N potentiellement libéré
      jusqu'en sortie d'hiver, en cumulant les apports de type 0, I.a, I.b
      et II. Si le couvert est récolté suffisamment tard l'année suivante,
      permettant un apport de fertilisant de type III en sortie d'hiver, ce
      plafond d'apport inclut les apports de type III.

  pc13:
    mots_cles: "Plafond CINE détruit avant 31/12"
    type: "plafonnement_apports"
    texte_court: |
      Cumul de 70 kg d'azote par hectare.
    texte_redaction_initiale: |
      Apports réalisés à compter de la récolte du précédent plafonnés à
      70 kg N potentiellement libéré jusqu'en sortie d'hiver, en cumulant les
      apports de type 0, I.a, et I.b, et II.

  pc14:
    mots_cles: "Plafond CI longue exporté avant 31/12"
    type: "plafonnement_apports"
    texte_court: |
      Cumul de 70 kg d'azote par hectare.
    texte_redaction_initiale: |
      Apports réalisés à compter de la récolte du précédent plafonnés à
      70 kg N potentiellement libéré jusqu'en sortie d'hiver, en cumulant les
      apports de type 0, I.a, et I.b, II et III.

  pc15:
    mots_cles: "Plafond CIE courte"
    type: "plafonnement_apports"
    texte_court: |
      Cumul de 70 kg d'azote par hectare.
    texte_redaction_initiale: |
      Apports à compter de la récolte du précédent plafonnés à 70 kg N
      potentiellement libéré jusqu'en sortie d'hiver, en cumulant les apports
      de type 0, I.a, et I.b.

  pc16:
    mots_cles: "Plafond prairies"
    type: "plafonnement_apports"
    texte_court: |
      Cumul de 70 kg d'azote par hectare.
    texte_redaction_initiale: |
      Pour les prairies permanentes, apports à compter du 1er septembre
      limités à 70 kg N potentiellement libéré jusqu'en sortie d'hiver par
      hectare en cumulant les apports de type 0, I, II et III.


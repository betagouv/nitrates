# Utilisés dans les règles où la période d'interdiction dépend du cycle de la
# plante plutôt que de dates fixes.

evenements_phenologiques:
  # `date_calendrier` : date JJ/MM arbitraire conventionnelle pour positionner
  # l'événement sur la barre 12 mois du calendrier d'épandage. Ne reflète pas
  # une date métier (celle-ci dépend du climat, de la parcelle). Sert
  # uniquement à dessiner une zone visible côté simulateur.
  semis:
    libelle_public: "Semis"
    date_calendrier: "15/04"
  implantation_couvert:
    libelle_public: "Implantation du couvert"
    date_calendrier: "15/08"
  destruction_couvert:
    libelle_public: "Destruction du couvert"
    date_calendrier: "15/03"
  recolte:
    libelle_public: "Récolte"
    date_calendrier: "15/09"
  brunissement_soies:
    libelle_public: "Brunissement des soies (maïs)"
    # Date conventionnelle de rendu calendrier reportee a mi-aout suite au
    # retour Louise (2026-05-13) : sur le terrain, le brunissement des
    # soies peut survenir jusque vers le 15/08, etendre la zone hachuree
    # jusque la colle mieux a la realite.
    date_calendrier: "15/08"
  brunissement_des_soies:
    libelle_public: "Brunissement des soies (maïs)"
    date_calendrier: "15/08"
  derniere_coupe_luzerne:

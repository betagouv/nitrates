    # Date conventionnelle de rendu calendrier : place au milieu de la fenetre
    # d'interdiction 15/12 -> 15/01 pour que la zone hachuree "autorise apres
    # coupe" apparaisse visuellement dans la fenetre rouge.
    date_calendrier: "20/12"

# ─────────────────────────────────────────────────────────────────────────────
# CATÉGORIES UTILISATEUR DE FERTILISANTS (Étape 1 du formulaire)
# ─────────────────────────────────────────────────────────────────────────────
# Source : Miro juristes "Tdb - Reglementation Nitrate_type_fertilisant"
# (PDF archivé dans specs/Tdb - Reglementation Nitrate_type_fertilisant_2026-04-28.pdf).
#
# L'utilisateur saisit en deux niveaux dans le formulaire :
#   1. catégorie de fertilisant (orange dans le Miro)
#   2. sous-fertilisant (blanc dans le Miro)
#
# Le moteur résout ensuite la catégorie + sous-fertilisant en un type
# réglementaire (type_0, type_Ia, type_Ib, type_II, type_III) via le mapping
# `mapping_sous_fertilisant_vers_type` ci-dessous, avant de descendre dans
# l'arbre de décision (qui raisonne uniquement sur les types réglementaires).
#
# IMPORTANT — cohérence avec la grammaire :
#   Les valeurs cibles du mapping (`type_0`, `type_Ia`, `type_Ib`, `type_II`,
#   `type_III`) sont strictement celles utilisées dans `arbre_decision_national.yaml`
#   sur les nœuds `formulaire/type_fertilisant`. Pas de mismatch possible.
# ─────────────────────────────────────────────────────────────────────────────

categories_fertilisants:

  fumiers:
    libelle_public: "Fumiers"
    sous_fertilisants:
      - "fumier_volaille"
      - "fumier_compact_non_susceptible_ecoulement"
      - "fumier_mou_susceptible_ecoulement"

  lisiers:
    libelle_public: "Lisiers"
    sous_fertilisants:
      - "dejection_sans_litiere"
      - "fientes_volailles"
      - "fraction_liquide_separation_lisiers"
      - "fraction_liquide_raclage_v_porcin"

  composts:
    libelle_public: "Composts"
    sous_fertilisants:
      - "compost_dechets_verts_jeunes_ligneux"
      - "compost_dechets_verts_matures"
      - "compost_effluents_elevage"
      - "compost_fientes_volailles"
      - "compost_ordures_menageres"
      - "compost_marcs_raisins"
      - "compost_fractions_solides_digestats"
      - "compost_biodechets"
      - "compost_miate"

  digestats:
    libelle_public: "Digestats"
    sous_fertilisants:
      - "digestat_brut_methanisation"
      - "fraction_liquide_digestat_methanisation"
      - "compost_fractions_solides_digestats"

  engrais_mineral:
    libelle_public: "Engrais minéral"
    sous_fertilisants:
      - "engrais_azote_mineral"

  boues:
    libelle_public: "Boues"
    sous_fertilisants:
      - "boues_papeterie"
      - "eaux_residuaires"

  autre:
    libelle_public: "Autre"
    description: |
      Catégorie fourre-tout pour les fertilisants non listés dans les
      catégories spécifiques. L'utilisateur peut soit saisir un sous-fertilisant
      précis (marc de raisins frais, vinasses…), soit déclarer directement
      le type réglementaire qu'il connaît, soit choisir l'option fallback
      "type inconnu" qui résout en type_II par défaut conservateur.
    sous_fertilisants:
      - "marcs_raisins_frais"
      - "effluents_peu_charges_autre"
      - "farines_animales"
      - "vinasses_betterave"
      - "type_0_declare"
      - "type_Ia_declare"
      - "type_Ib_declare"
      - "type_II_ou_inconnu"


    libelle_public: "Digestats bruts de méthanisation"
  fraction_liquide_digestat_methanisation:
    libelle_public: "Fractions liquides des digestats de méthanisation"

  # ── Engrais minéral ────────────────────────────────────────────────────────
  engrais_azote_mineral:
    libelle_public: "Engrais azoté minéral (ammonitrates...)"

  # ── Boues ──────────────────────────────────────────────────────────────────
  boues_papeterie:
    libelle_public: "Boues de papeterie"
  eaux_residuaires:
    libelle_public: "Eaux résiduaires"

  # ── Autre ──────────────────────────────────────────────────────────────────
  marcs_raisins_frais:
    libelle_public: "Marcs de raisins frais"
  effluents_peu_charges_autre:
    libelle_public: "Effluents peu chargés"
    description: |
      Marqué "Effluents peu chargés" dans la catégorie Autre du Miro. Le flag
      transverse `effluent_peu_charge` (cf. types_fertilisants) reste utilisé
      par l'arbre pour les assouplissements notes 8-11.
  farines_animales:
    libelle_public: "Farines de plumes, de poisson, de sang, d'os, soies de porcs, tourteaux de ricin, guanos d'oiseaux marins"
  vinasses_betterave:
    libelle_public: "Vinasses de betterave"
  type_0_declare:
    libelle_public: "Type 0 (déclaré directement par l'utilisateur)"
  type_Ia_declare:
    libelle_public: "Type Ia (déclaré directement par l'utilisateur)"
  type_Ib_declare:
    libelle_public: "Type Ib (déclaré directement par l'utilisateur)"
  type_II_ou_inconnu:
    libelle_public: "Type II ou fertilisant organique de type inconnu"
    description: |
      Fallback conservateur : si l'utilisateur ne sait pas ou si le fertilisant
      ne rentre dans aucune catégorie listée, le moteur considère type_II.

# ─────────────────────────────────────────────────────────────────────────────
# MAPPING SOUS-FERTILISANT → TYPE RÉGLEMENTAIRE
# ─────────────────────────────────────────────────────────────────────────────
# Source unique de vérité pour la résolution catégorie utilisateur → type
# réglementaire utilisé par l'arbre de décision.
#
# Référencé par les nœuds catalogue de type `mapping_referentiel` dans
# l'arbre, ou directement par le moteur entre la phase "formulaire" (catégorie
# + sous-fertilisant saisis) et la phase "évaluation" (descente dans l'arbre).
#
# Les VALEURS du mapping (à droite) sont strictement les identifiants utilisés
# par l'arbre dans les `valeur:` des nœuds `formulaire/type_fertilisant` :
#   "type_0" | "type_Ia" | "type_Ib" | "type_II" | "type_III"
# Validé par grep sur arbre_decision_national.yaml le 2026-04-28.
# ─────────────────────────────────────────────────────────────────────────────

mapping_sous_fertilisant_vers_type:

  # ── Fumiers ────────────────────────────────────────────────────────────────
  fumier_volaille: "type_II"
  fumier_compact_non_susceptible_ecoulement: "type_Ia"
  fumier_mou_susceptible_ecoulement: "type_Ib"

  # ── Lisiers ────────────────────────────────────────────────────────────────
  dejection_sans_litiere: "type_II"
  fientes_volailles: "type_II"
  fraction_liquide_separation_lisiers: "type_II"
  fraction_liquide_raclage_v_porcin: "type_II"

  # ── Composts ───────────────────────────────────────────────────────────────
  compost_dechets_verts_jeunes_ligneux: "type_0"
  compost_dechets_verts_matures: "type_Ia"
  compost_effluents_elevage: "type_Ia"
  compost_fientes_volailles: "type_II"
  compost_ordures_menageres: "type_Ia"
  compost_marcs_raisins: "type_Ia"
  compost_fractions_solides_digestats: "type_Ia"
  compost_biodechets: "type_Ib"
  compost_miate: "type_Ib"

  # ── Digestats ──────────────────────────────────────────────────────────────
  digestat_brut_methanisation: "type_II"
  fraction_liquide_digestat_methanisation: "type_II"
  # NB : compost_fractions_solides_digestats apparaît AUSSI dans la catégorie
  # "digestats" dans le Miro (typé Type Ia) — déjà mappé ci-dessus, pas de
  # duplication nécessaire (clé YAML unique).

  # ── Engrais minéral ────────────────────────────────────────────────────────
  engrais_azote_mineral: "type_III"

  # ── Boues ──────────────────────────────────────────────────────────────────
  boues_papeterie: "type_0"
  eaux_residuaires: "type_II"

  # ── Autre ──────────────────────────────────────────────────────────────────
  marcs_raisins_frais: "type_0"
  effluents_peu_charges_autre: "type_II"
  farines_animales: "type_II"
  vinasses_betterave: "type_II"
  type_0_declare: "type_0"
  type_Ia_declare: "type_Ia"
  type_Ib_declare: "type_Ib"
  type_II_ou_inconnu: "type_II"

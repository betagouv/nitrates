  source_juridique: "Arrêté établissant le programme d'actions régional en vue de la protection des eaux contre la pollution par les nitrates d'origine agricole en Hauts-de-France (entrée en vigueur 1er août 2024) — article 2 (I : périodes d'interdiction ; II-A : condition d'épandage sur couvert non exporté).\n"

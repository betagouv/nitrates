                id: q_cine_apres_0101
                champ: type_fertilisant
                texte: Quel type de fertilisant est utilisé ?
                niveau: type_fertilisant
                branches:
                - noeud:
                    id: q_cine_apres_0101_type_ia_especes
                    aide: "Le couvert est composé d'espèces à développement rapide : avoine fourragère, phacélie, navette fourragère, seigle, moutarde, colza d'hiver, radis fourrager et radis anti-nématodes, trèfle d'Alexandrie, vesce de printemps — le mélange de légumineuses entre elles est exclu ; d'autres espèces peuvent entrer dans un mélange d'espèces à développement rapide dans la limite de 20 % en masse."
                    champ: couvert_especes_developpement_rapide
                    texte: Le couvert d'interculture est-il composé d'espèces à développement rapide (avoine fourragère, phacélie, navette fourragère, seigle, moutarde, colza d'hiver, radis fourrager ou anti-nématodes, trèfle d'Alexandrie, vesce de printemps — hors mélange de légumineuses entre elles, autres espèces limitées à 20 % en masse du mélange) ?
                    niveau: complement
                    branches:
                    - valeur: true
                      libelle: Oui
                      feuille_vide: true
                    - regle:
                        id: r_cine_apres_0101_type_ia_hors_especes_rapides
                        type: interdiction
                        message: Épandage interdit toute l'année sur ce couvert.
                        periodes:
                        - au: 30/06
                          du: 01/07
                        texte_condition: "L'épandage de fertilisants azotés organiques de type I ou II sur un couvert d'interculture non exporté est autorisé uniquement pour les espèces à développement rapide (art. 2-II A) : couvert hors liste, épandage interdit. Tout épandage de fertilisants azotés est interdit sur les repousses."
                        source_juridique: "Article 2-II A du PAR Hauts-de-France (épandage de fertilisants azotés organiques de type I ou II sur couvert d'interculture non exporté : autorisé uniquement pour les espèces à développement rapide)"
                      valeur: false
                      libelle: Non
                    type_noeud: formulaire

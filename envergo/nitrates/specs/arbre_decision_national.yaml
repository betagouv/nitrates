#     luzerne, autres_cultures, intercultures courtes), le Miro fusionne Ia+Ib
#     en "Type I" car règles identiques. Distinction Ia/Ib préservée uniquement
#     sur les branches qui en ont besoin (pre_3112_sans_couvert,
#     cine_apres_0101, cine_avant_3112, cie_avant_3112).

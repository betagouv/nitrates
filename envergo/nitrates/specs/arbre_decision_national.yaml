# =============================================================================
# ARBRE DE DÉCISION NATIONAL — PAN 7
# =============================================================================
# Base juridique : arrêté du 30/01/2023 modifiant arrêté du 19/12/2011
# Source de transcription : SVG Miro juristes "Tdb - Reglementation Nitrate -
# Arbre de décision NATIONAL.svg" (export 2026-04-28).
# Archivé dans specs/Tdb - Reglementation Nitrate-DecisionTree-28-04-26.svg.
# Extraction structurée : decision_tree_yaml/arbre_decision_national_28-04_EXTRACTED.txt.
#
# Lecture : ce fichier reproduit la structure du Miro. Chaque nœud est typé
# (formulaire vs catalogue) et porte un niveau formulaire explicite.
# Cf. grammaire.yaml.
#
# ⚠️ BROUILLON — à valider par le métier (Emma + Louise).
# =============================================================================

metadata:
  version: "0.4.0-draft"
  source: "PAN 7 - arrêté 30/01/2023 modifiant arrêté 19/12/2011 — Miro juristes 28/04/2026"
  derniere_maj: "2026-04-28"
  statut: "brouillon - migré depuis SVG Miro 28/04 (grammaire v2 inchangée)"

arbre:
  noeud:
    type_noeud: "catalogue"
    id: "n_zvn"
    champ: "en_zone_vulnerable"
    source: "sig"
    reference: "zone_vulnerable_nitrates"
    branches:

      - valeur: false
        libelle: "Non"
        regle:
          id: "r_hors_zvn"
          type: "non_applicable"
          message: "La parcelle n'est pas en zone vulnérable aux nitrates. La réglementation nitrates ne s'applique pas."

      - valeur: true
        libelle: "Oui"
        noeud:
          type_noeud: "formulaire"
          niveau: "culture"
          id: "q_occupation_sol"
          texte: "Est-ce que la culture en place est une culture principale ou un couvert végétal d'interculture ?"
          champ: "occupation_sol"
          branches:

            # ═════════════════════════════════════════════════════════════════
            # BRANCHE — SOL NON CULTIVÉ (court-circuit)
            # ═════════════════════════════════════════════════════════════════
            - valeur: "sol_non_cultive"
              libelle: "Sol non cultivé"
              regle:
                id: "r_sol_non_cultive"
                type: "interdiction"
                periodes:
                  - du: "01/01"
                    au: "31/12"
                message: "Épandage interdit toute l'année sur sol non cultivé."

            # ═════════════════════════════════════════════════════════════════
            # BRANCHE — CULTURE PRINCIPALE
            # ═════════════════════════════════════════════════════════════════
            - valeur: "culture_principale"
              libelle: "Culture principale"
              noeud:
                type_noeud: "formulaire"
                niveau: "sous_culture"
                id: "q_culture_principale_type"
                texte: "Quelle culture principale ?"
                champ: "sous_culture"
                branches:

                  # ─── COLZA ──────────────────────────────────────────────────
                  - valeur: "colza"
                    libelle: "Colza"
                    noeud:
                      type_noeud: "formulaire"
                      niveau: "type_fertilisant"
                      id: "q_colza_fertilisant"
                      texte: "Quel type de fertilisant est utilisé ?"
                      champ: "type_fertilisant"
                      branches:

                        - valeur: "type_0"
                          regle:
                            id: "r_colza_type_0"
                            type: "interdiction"
                            periodes:
                              - du: "15/12"
                                au: "15/01"

                        - valeur: "type_I"
                          libelle: "Type I (Ia ou Ib)"
                          regle:
                            id: "r_colza_type_I"
                            type: "interdiction"
                            periodes:
                              - du: "15/11"
                                au: "15/01"

                        - valeur: "type_II"
                          noeud:
                            type_noeud: "catalogue"
                            id: "n_colza_type_II_zone_note_5"
                            champ: "zone_note_5"
                            source: "sig"
                            reference: "zone_note_5"
                            branches:
                              - valeur: true
                                libelle: "Note 5 — Régions PACA, Occitanie et départements de Dordogne (24), Gironde (33), Landes (40), Lot-et-Garonne (47) et Pyrénées-Atlantiques (64)"
                                regle:
                                  id: "r_colza_type_II_note5"
                                  type: "interdiction"
                                  periodes:
                                    - du: "15/10"
                                      au: "15/01"
                                  note: "note_5"
                              - valeur: false
                                libelle: "Pas concerné par la note 5"
                                regle:
                                  id: "r_colza_type_II_autres"
                                  type: "interdiction"
                                  periodes:
                                    - du: "15/10"
                                      au: "31/01"

                        # ⚠️ MAJ 30/04 : Type III refondu par les juristes
                        # - La question "concerné par la note 13" a été
                        #   supprimée (note 13 "à priori ne s'applique pas").
                        # - Le verdict Type III est maintenant cumulé :
                        #   période 1 (01/09 → 15/10) = autorisation sous condition
                        #   période 2 (15/10 → 15/01 ou 31/01) = interdiction stricte
                        # - PC11 sur le Miro est noté "colza" alors que dans
                        #   referentiels.yaml PC11 = "Plafond CI post 31/12".
                        #   À clarifier avec Louise — fidélité littérale au Miro
                        #   conservée pour l'instant.
                        # Modélisation : champ `regime` optionnel sur chaque période
                        # pour distinguer les segments (interdiction stricte vs
                        # autorisation sous condition) à l'intérieur d'une même règle.
                        - valeur: "type_III"
                          noeud:
                            type_noeud: "catalogue"
                            id: "n_colza_type_III_zone_note_5"
                            champ: "zone_note_5"
                            source: "sig"
                            reference: "zone_note_5"
                            branches:
                              - valeur: true
                                libelle: "Note 5 — Régions PACA, Occitanie et départements de Dordogne (24), Gironde (33), Landes (40), Lot-et-Garonne (47) et Pyrénées-Atlantiques (64)"
                                regle:
                                  id: "r_colza_type_III_note5"
                                  # Convention grammaire 2026-05-11 : type=mixte
                                  # quand la regle porte plusieurs regimes
                                  # distincts. Chaque periode declare son regime.
                                  # PC11 colza : autorise sous condition
                                  # 01/09→15/10 (apport additionnel 30 unites N),
                                  # interdit ensuite.
                                  type: "mixte"
                                  periodes:
                                    - du: "01/09"
                                      au: "15/10"
                                      regime: "autorisation_sous_condition"
                                    - du: "15/10"
                                      au: "15/01"
                                      regime: "interdiction"
                                  code_prescription: "pc11"
                                  note: "note_5"
                              - valeur: false
                                libelle: "Pas concerné par la note 5"
                                regle:
                                  id: "r_colza_type_III_autres"
                                  # Cf r_colza_type_III_note5 ci-dessus.
                                  type: "mixte"
                                  periodes:
                                    - du: "01/09"
                                      au: "15/10"
                                      regime: "autorisation_sous_condition"
                                    - du: "15/10"
                                      au: "31/01"
                                      regime: "interdiction"
                                  code_prescription: "pc11"

                  # ─── CULTURE D'HIVER AUTRE QUE COLZA (nouvelle branche 30/04) ─
                  # Ajoutée par les juristes le 30/04. Structure et dates
                  # identiques à "culture récoltée après le 01/01 hors colza"
                  # — à ce stade pas factorisé via renvoi_vers, à vérifier avec
                  # le métier si les deux branches sont sémantiquement
                  # équivalentes.
                  - valeur: "culture_hiver_hors_colza"
                    libelle: "Culture d'hiver autre que colza"
                    noeud:
                      type_noeud: "formulaire"
                      niveau: "type_fertilisant"
                      id: "q_hiver_hors_colza_fertilisant"
                      texte: "Quel type de fertilisant est utilisé ?"
                      champ: "type_fertilisant"
                      branches:

                        - valeur: "type_0"
                          regle:
                            id: "r_hiver_hors_colza_type_0"
                            type: "interdiction"
                            periodes:
                              - du: "15/12"
                                au: "15/01"

                        - valeur: "type_I"
                          libelle: "Type I (Ia ou Ib)"
                          regle:
                            id: "r_hiver_hors_colza_type_I"
                            type: "interdiction"
                            periodes:
                              - du: "15/11"
                                au: "15/01"

                        - valeur: "type_II"
                          noeud:
                            type_noeud: "catalogue"
                            id: "n_hiver_hors_colza_type_II_zone_note_5"
                            champ: "zone_note_5"
                            source: "sig"
                            reference: "zone_note_5"
                            branches:
                              - valeur: true
                                libelle: "Note 5 — Régions PACA, Occitanie et départements de Dordogne (24), Gironde (33), Landes (40), Lot-et-Garonne (47) et Pyrénées-Atlantiques (64)"
                                regle:
                                  id: "r_hiver_hors_colza_type_II_note5"
                                  type: "interdiction"
                                  periodes:
                                    - du: "01/10"
                                      au: "15/01"
                                  note: "note_5"
                              - valeur: false
                                libelle: "Pas concerné par la note 5"
                                regle:
                                  id: "r_hiver_hors_colza_type_II_autres"
                                  type: "interdiction"
                                  periodes:
                                    - du: "01/10"
                                      au: "31/01"

                        - valeur: "type_III"
                          noeud:
                            type_noeud: "catalogue"
                            id: "n_hiver_hors_colza_type_III_zone_note_5"
                            champ: "zone_note_5"
                            source: "sig"
                            reference: "zone_note_5"
                            branches:
                              - valeur: true
                                libelle: "Note 5 — Régions PACA, Occitanie et départements de Dordogne (24), Gironde (33), Landes (40), Lot-et-Garonne (47) et Pyrénées-Atlantiques (64)"
                                regle:
                                  id: "r_hiver_hors_colza_type_III_note5"
                                  type: "interdiction"
                                  periodes:
                                    - du: "01/09"
                                      au: "15/01"
                                  note: "note_5"
                              - valeur: false
                                libelle: "Pas concerné par la note 5"
                                regle:
                                  id: "r_hiver_hors_colza_type_III_autres"
                                  type: "interdiction"
                                  periodes:
                                    - du: "01/09"
                                      au: "31/01"

                  # ─── CULTURE DE PRINTEMPS (nouvelle branche 30/04) ──────────
                  # Ajoutée par les juristes le 30/04. Structure et dates
                  # identiques à "culture récoltée avant le 31/12 sans couvert"
                  # — à valider avec Louise si les deux branches sont
                  # sémantiquement équivalentes (auquel cas on factorisera
                  # via renvoi_vers).
                  - valeur: "culture_printemps"
                    libelle: "Culture de printemps"
                    noeud:
                      type_noeud: "formulaire"
                      niveau: "type_fertilisant"
                      id: "q_printemps_fertilisant"
                      texte: "Quel type de fertilisant est utilisé ?"
                      champ: "type_fertilisant"
                      branches:

                        - valeur: "type_0"
                          regle:
                            id: "r_printemps_type_0"
                            type: "interdiction"
                            periodes:
                              - du: "15/12"
                                au: "15/01"

                        - valeur: "type_Ia"
                          regle:
                            id: "r_printemps_type_Ia"
                            type: "interdiction"
                            periodes:
                              - du: "01/07"
                                au: "31/08"
                              - du: "15/11"
                                au: "15/01"

                        - valeur: "type_Ib"
                          regle:
                            id: "r_printemps_type_Ib"
                            type: "interdiction"
                            periodes:
                              - du: "01/07"
                                au: "15/01"

                        # Type II : pas de qualification preliminaire ; on
                        # demande directement la question complementaire sur
                        # l'usage en fertirrigation. Cf. spec Miro 2026-05-06
                        # (clarification : "type II + effluents peu charges"
                        # etait une imprecision, c'est juste type II suivi
                        # d'une question subsidiaire fertirrigation).
                        - valeur: "type_II"
                          noeud:
                            type_noeud: "formulaire"
                            niveau: "complement"
                            id: "q_printemps_II_fertirrigation"
                            texte: "Effluents peu chargés en fertirrigation ?"
                            champ: "fertirrigation"
                            branches:
                              - valeur: true
                                libelle: "Oui"
                                regle:
                                  id: "r_printemps_II_fertirrig"
                                  # Convention grammaire 2026-05-11 : type=mixte
                                  # quand la regle porte plusieurs regimes
                                  # distincts. PC6 : fertirrigation effluents
                                  # peu charges autorisee sous condition
                                  # 01/07→31/08, puis interdiction 31/08→31/01.
                                  type: "mixte"
                                  periodes:
                                    - du: "01/07"
                                      au: "31/08"
                                      regime: "autorisation_sous_condition"
                                    - du: "31/08"
                                      au: "31/01"
                                      regime: "interdiction"
                                  code_prescription: "pc6"
                              - valeur: false
                                libelle: "Non"
                                regle:
                                  id: "r_printemps_II_sans_fertirrig"
                                  type: "interdiction"
                                  periodes:
                                    - du: "01/07"
                                      au: "31/01"

                        - valeur: "type_III"
                          noeud:
                            type_noeud: "formulaire"
                            niveau: "complement"
                            id: "q_printemps_III_irriguee"
                            texte: "Culture irriguée ?"
                            champ: "culture_irriguee"
                            branches:
                              - valeur: true
                                libelle: "Oui"
                                noeud:
                                  type_noeud: "formulaire"
                                  niveau: "complement"
                                  id: "q_printemps_III_irriguee_culture"
                                  texte: "Quelle culture irriguée ?"
                                  champ: "culture_irriguee_type"
                                  branches:
                                    - valeur: "mais"
                                      libelle: "Maïs"
                                      regle:
                                        # Spec PC5 (referentiels.yaml) :
                                        # "En presence d'une culture irriguee,
                                        # l'apport de fertilisants azotes de
                                        # type III est autorise jusqu'au 15
                                        # juillet, et, sur mais irrigue,
                                        # jusqu'au stade du brunissement des
                                        # soies du mais."
                                        # Modelisation : interdiction stricte
                                        # 15/07 -> 15/02 (periode hivernale).
                                        # Sur mais, la borne de debut peut
                                        # glisser plus tard si les soies n'ont
                                        # pas encore brunis au 15/07. Le
                                        # message ci-dessous explique cette
                                        # extension phenologique a l'utilisateur.
                                        id: "r_printemps_III_mais_irrigue"
                                        type: "interdiction"
                                        periodes:
                                          - du: "15/07"
                                            au: "15/02"
                                        code_prescription: "pc5"
                                        message: |
                                          Sur maïs irrigué, le début de la
                                          période d'interdiction (15 juillet)
                                          peut être décalé jusqu'au stade du
                                          brunissement des soies si celui-ci
                                          survient après cette date.
                                    - valeur: "autre"
                                      libelle: "Autre culture irriguée"
                                      regle:
                                        id: "r_printemps_III_autre_irrigue"
                                        type: "interdiction"
                                        periodes:
                                          - du: "15/07"
                                            au: "15/02"
                                        code_prescription: "pc5"
                              - valeur: false
                                libelle: "Non"
                                regle:
                                  id: "r_printemps_III_non_irrigue"
                                  type: "interdiction"
                                  periodes:
                                    - du: "01/07"
                                      au: "15/02"

                  # ─── PRAIRIES IMPLANTÉES DEPUIS PLUS DE 6 MOIS ──────────────
                  - valeur: "prairie_plus_6_mois"
                    libelle: "Prairies implantées depuis plus de six mois (dont prairie permanente)"
                    noeud:
                      type_noeud: "formulaire"
                      niveau: "type_fertilisant"
                      id: "q_prairie_plus6_fertilisant"
                      texte: "Quel type de fertilisant est utilisé ?"
                      champ: "type_fertilisant"
                      branches:

                        - valeur: "type_0"
                          noeud:
                            type_noeud: "formulaire"
                            niveau: "complement"
                            id: "q_prairie_plus6_type_0_icpe"
                            texte: "Plan d'épandage ?"
                            champ: "plan_epandage"
                            branches:
                              - valeur: "icpe_a"
                                libelle: "À autorisation (ICPE A)"
                                regle:
                                  id: "r_prairie_plus_6_type_0_icpe_a"
                                  type: "autorisation_sous_condition"
                                  periodes:
                                    - du: "15/12"
                                      au: "15/01"
                                  code_prescription: "pc1"
                                  texte_condition: "Autorisé sous condition entre le 15/12 et le 15/01 (ICPE A)."
                              - valeur: "autre"
                                libelle: "Autre"
                                regle:
                                  id: "r_prairie_plus_6_type_0"
                                  type: "interdiction"
                                  periodes:
                                    - du: "15/12"
                                      au: "15/01"
                                  code_prescription: "pc4"

                        - valeur: "type_I"
                          libelle: "Type I (Ia ou Ib)"
                          regle:
                            id: "r_prairie_plus_6_type_I"
                            type: "interdiction"
                            periodes:
                              - du: "15/12"
                                au: "15/01"
                            code_prescription: "pc4"

                        - valeur: "type_II"
                          noeud:
                            type_noeud: "formulaire"
                            niveau: "complement"
                            id: "q_prairie_plus6_II_effluent"
                            texte: "Effluents peu chargés ?"
                            champ: "effluent_peu_charge"
                            branches:
                              - valeur: true
                                libelle: "Oui"
                                regle:
                                  id: "r_prairie_plus_6_type_II_peu_charge"
                                  type: "autorisation_sous_condition"
                                  periodes:
                                    - du: "15/11"
                                      au: "15/01"
                                  code_prescription: "pc7"
                              - valeur: false
                                libelle: "Non"
                                regle:
                                  id: "r_prairie_plus_6_type_II"
                                  type: "interdiction"
                                  periodes:
                                    - du: "15/11"
                                      au: "15/01"
                                  code_prescription: "pc4"

                        - valeur: "type_III"
                          noeud:
                            type_noeud: "catalogue"
                            id: "n_prairie_plus6_III_zonage"
                            champ: "zonage_prairie_III"
                            source: "sig"
                            reference: "zonage_prairie_III"
                            branches:
                              - valeur: "montagne_note_7"
                                libelle: "Zone montagne (D113-14) — PACA, Occitanie, Pyrénées-Atlantiques (64) (Note 7)"
                                regle:
                                  id: "r_prairie_plus_6_type_III_montagne_note7"
                                  type: "interdiction"
                                  periodes:
                                    - du: "01/10"
                                      au: "15/02"
                                  code_prescription: "pc4"
                                  note: "note_7"
                              - valeur: "montagne_note_6"
                                libelle: "Zone montagne (D113-14) — autre région/département (Note 6)"
                                regle:
                                  id: "r_prairie_plus_6_type_III_montagne_note6"
                                  type: "interdiction"
                                  periodes:
                                    - du: "01/10"
                                      au: "28/02"
                                  code_prescription: "pc4"
                                  note: "note_6"
                              - valeur: "non_montagne"
                                libelle: "Hors zone montagne"
                                regle:
                                  id: "r_prairie_plus_6_type_III"
                                  type: "interdiction"
                                  periodes:
                                    - du: "01/10"
                                      au: "15/01"
                                  code_prescription: "pc4"

                  # ─── LUZERNE ────────────────────────────────────────────────
                  - valeur: "luzerne"
                    libelle: "Luzerne"
                    noeud:
                      type_noeud: "formulaire"
                      niveau: "type_fertilisant"
                      id: "q_luzerne_fertilisant"
                      texte: "Quel type de fertilisant est utilisé ?"
                      champ: "type_fertilisant"
                      branches:

                        - valeur: "type_0"
                          renvoi_vers: "r_prairie_plus_6_type_0"

                        - valeur: "type_I"
                          libelle: "Type I (Ia ou Ib)"
                          noeud:
                            type_noeud: "formulaire"
                            niveau: "complement"
                            id: "q_luzerne_I_icpe"
                            texte: "Plan d'épandage ?"
                            champ: "plan_epandage"
                            branches:
                              - valeur: "icpe_a"
                                libelle: "À autorisation (ICPE A)"
                                noeud:
                                  type_noeud: "formulaire"
                                  niveau: "complement"
                                  id: "q_luzerne_I_icpe_a_iaa"
                                  texte: "Le fertilisant est-il issu d'IAA (note 12) ?"
                                  champ: "fertilisant_iaa"
                                  branches:
                                    - valeur: true
                                      libelle: "Oui"
                                      regle:
                                        id: "r_luzerne_I_icpe_a_iaa"
                                        type: "calculatrice"
                                        composant: "luzerne_post_coupe"
                                        inputs_requis:
                                          - "date_derniere_coupe_luzerne"
                                        parametres:
                                          periode_reglementaire:
                                            du: "15/12"
                                            au: "15/01"
                                          code_prescription: "pc10"
                                          note: "note_12"
                                          texte_alternative: "Autorisé sous conditions après la dernière coupe de luzerne. Sinon interdit du 15/12 au 15/01."
                                    - valeur: false
                                      libelle: "Non"
                                      regle:
                                        id: "r_luzerne_I_icpe_a_sans_iaa"
                                        type: "interdiction"
                                        periodes:
                                          - du: "15/12"
                                            au: "15/01"
                                        # PC retiré le 30/04 pour fidélité au Miro
                                        # (version précédente avait pc10 par héritage).
                              - valeur: "autre"
                                libelle: "Autre (non concerné / ICPE E / ICPE D)"
                                regle:
                                  id: "r_luzerne_I_autre"
                                  type: "interdiction"
                                  periodes:
                                    - du: "15/12"
                                      au: "15/01"

                        - valeur: "type_II"
                          noeud:
                            type_noeud: "formulaire"
                            niveau: "complement"
                            id: "q_luzerne_II_icpe"
                            texte: "Plan d'épandage ?"
                            champ: "plan_epandage"
                            branches:
                              - valeur: "icpe_a"
                                libelle: "À autorisation (ICPE A)"
                                noeud:
                                  type_noeud: "formulaire"
                                  niveau: "complement"
                                  id: "q_luzerne_II_icpe_a_iaa"
                                  texte: "Le fertilisant est-il issu d'IAA (note 12) ?"
                                  champ: "fertilisant_iaa"
                                  branches:
                                    - valeur: true
                                      libelle: "Oui"
                                      regle:
                                        id: "r_luzerne_II_icpe_a_iaa"
                                        type: "calculatrice"
                                        composant: "luzerne_post_coupe"
                                        inputs_requis:
                                          - "date_derniere_coupe_luzerne"
                                        parametres:
                                          periode_reglementaire:
                                            du: "15/11"

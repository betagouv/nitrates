name: CI
permissions:
  actions: read

# Enable Buildkit and let compose use it to speed up image building
env:
  DATABASE_URL: "postgis://envergo:envergo@localhost:5432/envergo"
  USE_DOCKER: False
  LANG: "fr_FR.UTF-8"
  LC_ALL: "fr_FR.UTF-8"
  DJANGO_SETTINGS_MODULE: "config.settings.ci"

on:
  pull_request:
    branches: ["main"]

  push:
    branches: ["main"]

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.0.0
        with:
          python-version: 3.12.8

      # Run all pre-commit hooks on all the files.
      # Getting only staged files can be tricky in case a new PR is opened
      # since the action is run on a branch in detached head state
      - name: Install and Run Pre-commit
        uses: pre-commit/action@v3.0.1

  # With no caching at all the entire ci process takes 4m 30s to complete!
  pytest:
    runs-on: ubuntu-latest

    # Configure the database service
    services:
      database:
        image: postgis/postgis:14-master
        env:
          POSTGRES_USER: envergo
          POSTGRES_PASSWORD: envergo
          POSTGRES_DB: envergo
        ports:
          - 5432:5432
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Update package list
        run: |
          sudo apt update

      - name: Install french locale
        run: |
          sudo apt install language-pack-fr
          sudo locale-gen

      - name: Activate french locale
        run: |
          sudo update-locale LANG="fr_FR.UTF-8" LC_ALL="fr_FR.UTF-8"

      - name: Set up the database
        run: |
          psql -d postgresql://envergo:envergo@localhost/template1 -c 'CREATE EXTENSION IF NOT EXISTS postgis;'
          psql -d postgresql://envergo:envergo@localhost/template1 -c 'CREATE EXTENSION IF NOT EXISTS postgis_raster;'
        env:
          PGPASSWORD: envergo

      - name: Install dependencies
        run: |
          sudo apt install binutils libproj-dev gdal-bin gettext

      - name: Checkout Code Repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.0.0
        with:
          python-version: 3.12.8

      - name: Install python dependencies
        run: pip install -r requirements/local.txt

      - name: Install js dependencies
        run: npm ci

      - name: Build assets
        run: bash bin/build_assets.sh

      - name: Run Django Tests
        run: pytest

  # REVERT_AT_MERGE_TIME_FOR_UPSTREAM_ENVERGO
  # Le job e2e amenagement + GUH a ete supprime ici. Au remerge upstream,
  # restaurer le job e2e d'origine.
  #
  # TODO mvp 0.0.2: ajouter un job e2e-nitrates dedie a la place. Il sera ajoute
  # dans la PR qui apporte la vue debug + tests Playwright nitrates (les fichiers
  # playwright.config.nitrates.ts et e2e/nitrates/* ne sont pas dans cette PR).
